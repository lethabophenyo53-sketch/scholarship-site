<!DOCTYPE html>
<html>
<body>

<h2>Payment Successful 🎉</h2>
<p>Activating your premium...</p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
authDomain: "scholarship-platform-ec01f.firebaseapp.com",
projectId: "scholarship-platform-ec01f",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

auth.onAuthStateChanged(async (user)=>{
if(user){

await setDoc(doc(db,"profiles",user.uid),{
premium:true
},{merge:true});

document.body.innerHTML = "<h2>💎 Premium Activated!</h2><a href='index.html'>Go Back</a>";

}
});

</script>

</body>
</html>
