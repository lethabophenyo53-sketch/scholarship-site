<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scholar Match</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#eef2ff}
.app{max-width:480px;margin:auto;background:#fff;min-height:100vh}
.header{padding:15px;background:#4f46e5;color:#fff;text-align:center;font-weight:700}
.section{display:none;padding:15px}
.active{display:block}
.card{background:#fff;padding:12px;margin:10px 0;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
input,select{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ddd}
button{width:100%;padding:10px;background:#4f46e5;color:#fff;border:none;border-radius:8px;margin-top:5px}
.nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:#fff;max-width:480px;margin:auto}
.nav button{flex:1;background:none;color:#4f46e5;border:none;padding:12px}
.locked{opacity:0.5}
</style>
</head>

<body>

<div class="app">
<div class="header">🎓 Scholar Match</div>

<!-- AUTH -->
<div id="auth" class="section active">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- HOME -->
<div id="home" class="section">
<h3 id="welcome"></h3>

<select id="level">
<option>High School</option>
<option>College</option>
<option>University</option>
</select>

<button onclick="saveLevel()">Save Level</button>
<button onclick="logout()">Logout</button>
</div>

<!-- SCHOLARSHIPS -->
<div id="scholarships" class="section">
<h3>Scholarships</h3>
<div id="list"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
<h3>Admin Panel</h3>

<input id="title" placeholder="Title">
<input id="desc" placeholder="Description">
<input id="link" placeholder="Link">
<input id="deadline" type="date">

<select id="type">
<option value="free">Free</option>
<option value="premium">Premium</option>
</select>

<button onclick="addScholarship()">Add Scholarship</button>
<button onclick="autoGenerate()">Auto Generate</button>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="go('home')">Home</button>
<button onclick="go('scholarships')">Scholarships</button>
<button onclick="go('admin')">Admin</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
setDoc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG (PASTE YOUR REAL ONE HERE) */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let profile = null;
let isAdmin = false;

/* NAV */
window.go = (page)=>{
if(!auth.currentUser && page !== "auth") return go("auth");

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

/* AUTH */
window.signup = async ()=>{
const u = await createUserWithEmailAndPassword(auth,email.value,password.value);

await setDoc(doc(db,"users",u.user.uid),{
level:"High School",
premium:false
});
}

window.login = ()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.logout = ()=>signOut(auth);

/* AUTH STATE */
onAuthStateChanged(auth, async (user)=>{

if(!user){
go("auth");
return;
}

const snap = await getDoc(doc(db,"users",user.uid));
profile = snap.data();

isAdmin = user.email === "YOUR_ADMIN_EMAIL@gmail.com";

welcome.innerText = "Welcome " + user.email;

loadScholarships();
go("home");
});

/* SAVE LEVEL */
window.saveLevel = async ()=>{
await updateDoc(doc(db,"users",auth.currentUser.uid),{
level:level.value
});
alert("Saved");
}

/* LOAD SCHOLARSHIPS */
window.loadScholarships = async ()=>{
list.innerHTML = "";

const snap = await getDocs(collection(db,"scholarships"));

snap.forEach(d=>{
const s = d.data();

const locked = s.type === "premium" && !profile?.premium;

list.innerHTML += `
<div class="card ${locked ? "locked" : ""}">
<h4>${s.title}</h4>
<p>${locked ? "🔒 Premium locked" : s.desc}</p>
<p>Deadline: ${s.deadline}</p>

${locked ? "<button disabled>Locked</button>" :
`<a href="${s.link}" target="_blank">Apply</a>`}
</div>`;
});
}

/* ADMIN ADD */
window.addScholarship = async ()=>{
if(!isAdmin) return alert("Not admin");

await addDoc(collection(db,"scholarships"),{
title:title.value,
desc:desc.value,
link:link.value,
deadline:deadline.value,
type:type.value
});

alert("Added");
loadScholarships();
}

/* AUTO */
window.autoGenerate = async ()=>{
if(!isAdmin) return;

await addDoc(collection(db,"scholarships"),{
title:"NSFAS Funding",
desc:"Full university funding",
link:"#",
deadline:"2027-01-01",
type:"free"
});

loadScholarships();
}

</script>
</body>
</html>

</body>
</html>
