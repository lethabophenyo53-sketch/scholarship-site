<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholar Match</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ---------- General Styles ---------- */
body {
    font-family: 'Montserrat', sans-serif;
    margin: 0;
    padding: 0;
    background: url('https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
    background-size: cover;
    color: #333;
    scroll-behavior: smooth;
}

/* ---------- Main Container ---------- */
.container {
    max-width: 1200px;
    margin: auto;
    padding: 30px;
    background: rgba(255,255,255,0.95);
    border-radius: 15px;
    box-shadow: 0px 8px 25px rgba(0,0,0,0.3);
}

/* ---------- Hero Section ---------- */
.hero {
    text-align: center;
    background: rgba(27,31,59,0.85);
    color: white;
    padding: 70px 20px;
    border-radius: 12px;
    margin-bottom: 40px;
}
.hero h1 {
    font-size: 60px;
    margin-bottom: 20px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
}
.hero p {
    font-size: 20px;
    margin-bottom: 30px;
    text-shadow: 1px 1px 8px rgba(0,0,0,0.5);
}
.hero button {
    padding: 18px 40px;
    font-size: 18px;
    border-radius: 50px;
    background: linear-gradient(135deg,#6C63FF,#4CAF50);
    border: none;
    color: white;
    cursor: pointer;
    font-weight: 700;
    box-shadow: 0px 6px 20px rgba(0,0,0,0.4);
    transition: 0.3s;
}
.hero button:hover {
    transform: scale(1.05);
    box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
}

/* ---------- Auth Section ---------- */
.auth {
    text-align: center;
    margin-bottom: 40px;
}
.auth input {
    padding: 12px;
    margin: 8px;
    border-radius: 8px;
    border: 1px solid #ddd;
    width: 250px;
}
.auth button {
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background: #6C63FF;
    color: white;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}
.auth button:hover {
    background: #574fd6;
    transform: scale(1.05);
}

/* ---------- User Section ---------- */
#user-section {
    display: none;
    text-align: center;
}
#user-section input, #user-section select {
    padding: 12px;
    margin: 8px;
    border-radius: 8px;
    border: 1px solid #ddd;
    width: 250px;
}

/* ---------- Scholarship Cards ---------- */
.scholarship-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}
.scholarship {
    background: white;
    border: 1px solid #ddd;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
    width: 280px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: left;
}
.scholarship h4 {
    margin: 10px 0;
}
.scholarship p {
    font-size: 14px;
    color: #555;
}

/* ---------- Admin Section ---------- */
#admin-section {
    display: none;
    text-align: center;
    margin-top: 40px;
}
#admin-section input {
    width: 250px;
}
#admin-section button {
    margin-top: 10px;
}
</style>
</head>
<body>
<div class="container">
    <!-- Hero -->
    <div class="hero">
        <h1>Scholar Match</h1>
        <p>Find scholarships for Primary, High School, College & University students</p>
        <button onclick="document.getElementById('user-section').scrollIntoView({behavior:'smooth'});">Get Started Now</button>
    </div>

    <!-- Login / Signup -->
    <div class="auth">
        <h3>Login / Sign Up</h3>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button id="signupBtn">Sign Up</button>
        <button id="loginBtn">Login</button>
        <button id="logoutBtn">Logout</button>
    </div>

    <!-- User Section -->
    <div id="user-section">
        <h2 id="welcome"></h2>
        <h3>Your Profile</h3>
        <input type="text" id="country" placeholder="Country"><br>
        <input type="text" id="field" placeholder="Field of Study"><br>
        <select id="level">
            <option value="">Select Level</option>
            <option value="Primary School">Primary School</option>
            <option value="High School">High School</option>
            <option value="Certificate">Certificate</option>
            <option value="Diploma">Diploma</option>
            <option value="Degree">Degree</option>
            <option value="College">College</option>
            <option value="University">University</option>
        </select><br>
        <input type="number" id="age" placeholder="Age"><br>
        <input type="text" id="grade" placeholder="Grade (e.g., Grade 6, N/A)"><br>
        <button onclick="saveProfile()">Save Profile</button>

        <h3>Available Scholarships</h3>
        <div id="scholarship-list" class="scholarship-list"></div>

        <!-- Admin Section -->
        <div id="admin-section">
            <h3>Add Scholarship (Admin)</h3>
            <input type="text" id="title" placeholder="Scholarship Title"><br>
            <input type="text" id="description" placeholder="Description"><br>
            <input type="text" id="countryScholarship" placeholder="Country"><br>
            <input type="text" id="fieldScholarship" placeholder="Field of Study"><br>
            <select id="levelScholarship">
                <option value="">Select Level</option>
                <option value="Primary School">Primary School</option>
                <option value="High School">High School</option>
                <option value="Certificate">Certificate</option>
                <option value="Diploma">Diploma</option>
                <option value="Degree">Degree</option>
                <option value="College">College</option>
                <option value="University">University</option>
            </select><br>
            <input type="number" id="minAge" placeholder="Minimum Age"><br>
            <input type="number" id="maxAge" placeholder="Maximum Age"><br>
            <input type="text" id="gradeScholarship" placeholder="Grade"><br>
            <input type="text" id="link" placeholder="Application Link"><br>
            <button id="addScholarshipBtn">Add Scholarship</button>
            <button id="importAllBtn">Import All Scholarships</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
    authDomain: "scholarship-platform-ec01f.firebaseapp.com",
    projectId: "scholarship-platform-ec01f",
    storageBucket: "scholarship-platform-ec01f.firebasestorage.app",
    messagingSenderId: "807575045909",
    appId: "1:807575045909:web:9a61a548638423d7988b1c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const adminEmail = "lethabophenyo53@gmail.com";

// ---------- Elements ----------
const email = document.getElementById("email");
const password = document.getElementById("password");

// ---------- User Authentication ----------
document.getElementById("signupBtn").onclick = async () => {
    if (!email.value || !password.value) { alert("Enter email and password"); return; }
    try { await createUserWithEmailAndPassword(auth, email.value, password.value); alert("Account created"); } 
    catch (err) { alert(err.message); }
};
document.getElementById("loginBtn").onclick = async () => {
    if (!email.value || !password.value) { alert("Enter email and password"); return; }
    try { await signInWithEmailAndPassword(auth, email.value, password.value); } 
    catch (err) { alert(err.message); }
};
document.getElementById("logoutBtn").onclick = () => { signOut(auth); };

// ---------- Auth State ----------
onAuthStateChanged(auth, user => {
    if (user) {
        document.getElementById("user-section").style.display = "block";
        document.getElementById("welcome").innerText = "Welcome " + user.email;
        if (user.email === adminEmail) { document.getElementById("admin-section").style.display = "block"; }
        loadScholarships();
    } else {
        document.getElementById("user-section").style.display = "none";
    }
});

// ---------- Load Scholarships ----------
async function loadScholarships() {
    const list = document.getElementById("scholarship-list");
    list.innerHTML = "";
    const snapshot = await getDocs(collection(db, "scholarships"));
    snapshot.forEach(doc => {
        const s = doc.data();
        const div = document.createElement("div");
        div.className = "scholarship";
        div.innerHTML = `<h4>${s.title}</h4>
                         <p>${s.description}</p>
                         <p><b>Country:</b> ${s.country}</p>
                         <p><b>Field:</b> ${s.field}</p>
                         <p><b>Level:</b> ${s.level}</p>
                         <p><b>Grade:</b> ${s.grade}</p>
                         <a href="${s.link}" target="_blank">Apply</a>`;
        list.appendChild(div);
    });
}

// ---------- Add Scholarship ----------
document.getElementById("addScholarshipBtn").onclick = async () => {
    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const country = document.getElementById("countryScholarship").value;
    const field = document.getElementById("fieldScholarship").value;
    const level = document.getElementById("levelScholarship").value;
    const grade = document.getElementById("gradeScholarship").value;
    const link = document.getElementById("link").value;

    if (!title || !description) { alert("Please fill required fields"); return; }
    try {
        await addDoc(collection(db, "scholarships"), { title, description, country, field, level, grade, link });
        alert("Scholarship added");
        loadScholarships();
    } catch (err) { alert(err.message); }
};

// ---------- Import All Scholarships ----------
const initialScholarships = [
    {
        "title":"NSFAS Government Scholarship",
        "description":"Full funding for undergraduate students at public universities or TVET colleges.",
        "country":"South Africa",
        "level":"Degree",
        "grade":"N/A",
        "link":"https://www.nsfas.org.za"
    },
    {
        "title":"Funza Lushaka Bursary Programme",
        "description":"Supports students who want to become teachers in priority subjects.",
        "country":"South Africa",
        "level":"Degree",
        "grade":"N/A",
        "link":"https://www.funzalushaka.doe.gov.za"
    },
    {
        "title":"Mandela Rhodes Scholarship",
        "description":"Fully funded postgraduate scholarship at a South African university.",
        "country":"South Africa",
        "level":"University",
        "grade":"N/A",
        "link":"https://www.mandelarhodes.org"
    }
];

document.getElementById("importAllBtn").onclick = async () => {
    for (let s of initialScholarships) { await addDoc(collection(db,"scholarships"), s); }
    alert("All scholarships imported!");
    loadScholarships();
};
</script>
</body>
</html>
