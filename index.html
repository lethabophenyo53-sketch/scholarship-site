<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholar Match</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Montserrat', sans-serif;
    margin: 0;
    padding: 0;
    background: url('https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
    background-size: cover;
    color: #333;
}
.container {
    max-width: 1200px;
    margin: auto;
    padding: 30px;
    background: rgba(255,255,255,0.95);
    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
}
.hero {
    text-align: center;
    background: rgba(27,31,59,0.85);
    color: white;
    padding: 60px;
    border-radius: 10px;
    margin-bottom: 40px;
}
.hero button {
    margin-top: 20px;
    padding: 14px 28px;
    font-size: 18px;
    background: linear-gradient(135deg,#6C63FF,#4CAF50);
    border: none;
    border-radius: 50px;
    color: white;
    cursor: pointer;
}
.hero button:hover {
    transform: scale(1.05);
}
.auth {
    text-align: center;
    margin-bottom: 40px;
}
input {
    padding: 12px;
    margin: 8px;
    border-radius: 8px;
    border: 1px solid #ddd;
    width: 250px;
}
button {
    padding: 12px 25px;
    margin: 8px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #6C63FF, #4CAF50);
    color: white;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}
button:hover {
    transform: scale(1.05);
}
.scholarship-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}
.scholarship {
    background: white;
    border: 1px solid #ddd;
    padding: 15px;
    margin: 10px;
    border-radius: 12px;
    width: 280px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: left;
}
#user-section, #admin-section {
    display: none;
    text-align: center;
}
</style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>Scholar Match</h1>
        <p>Find scholarships for Primary, High School, College, Certificate, Diploma & University students</p>
        <button onclick="document.getElementById('auth-section').scrollIntoView({behavior:'smooth'})">Get Started Now</button>
    </div>
    <div id="auth-section" class="auth">
        <h3>Login / Sign Up</h3>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button id="signupBtn">Sign Up</button>
        <button id="loginBtn">Login</button>
    </div>
    <div id="user-section">
        <h2 id="welcome"></h2>
        <h3>Your Profile</h3>
        <input type="text" id="country" placeholder="Country"><br>
        <input type="text" id="field" placeholder="Field of Study"><br>
        <input type="text" id="level" placeholder="Level of School (Primary, High School, College, Certificate, Diploma, Bachelor, University)"><br>
        <input type="number" id="age" placeholder="Age"><br>
        <input type="text" id="grade" placeholder="Grade (e.g., Grade 6, Grade 12, N/A)"><br>
        <button id="saveProfileBtn">Save Profile</button>

        <h3>Available Scholarships</h3>
        <div id="scholarship-list" class="scholarship-list"></div>

        <div id="admin-section">
            <h3>Add Scholarship (Admin)</h3>
            <input type="text" id="title" placeholder="Scholarship Title"><br>
            <input type="text" id="description" placeholder="Description"><br>
            <input type="text" id="countryScholarship" placeholder="Country"><br>
            <input type="text" id="fieldScholarship" placeholder="Field of Study"><br>
            <input type="text" id="levelScholarship" placeholder="Level (Primary, High School, College, Certificate, Diploma, Bachelor, University)"><br>
            <input type="number" id="minAge" placeholder="Minimum Age"><br>
            <input type="number" id="maxAge" placeholder="Maximum Age"><br>
            <input type="text" id="gradeScholarship" placeholder="Grade (e.g., Grade 12, N/A)"><br>
            <input type="date" id="deadline"><br>
            <input type="text" id="link" placeholder="Application Link"><br>
            <button id="addScholarshipBtn">Add Scholarship</button>
        </div>
        <br>
        <button id="logoutBtn">Logout</button>
    </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, setDoc, doc, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
    authDomain: "scholarship-platform-ec01f.firebaseapp.com",
    projectId: "scholarship-platform-ec01f",
    storageBucket: "scholarship-platform-ec01f.firebasestorage.app",
    messagingSenderId: "807575045909",
    appId: "1:807575045909:web:9a61a548638423d7988b1c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const adminEmail = "lethabophenyo53@gmail.com";
let allScholarships = [];

// Sign Up
document.getElementById('signupBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if(!email || !password) { alert('Enter email and password'); return; }
    try { await createUserWithEmailAndPassword(auth,email,password); alert('Account Created'); } 
    catch(e){ alert(e.message); }
};

// Login
document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if(!email || !password) { alert('Enter email and password'); return; }
    try { await signInWithEmailAndPassword(auth,email,password); } catch(e){ alert(e.message); }
};

// Logout
document.getElementById('logoutBtn').onclick = () => { signOut(auth); };

// Save Profile
document.getElementById('saveProfileBtn').onclick = async () => {
    const user = auth.currentUser;
    if(!user){ alert('Login first'); return; }
    const profileData = {
        country: document.getElementById('country').value,
        field: document.getElementById('field').value,
        level: document.getElementById('level').value,
        age: document.getElementById('age').value,
        grade: document.getElementById('grade').value
    };
    await setDoc(doc(db,'profiles',user.uid),profileData);
    alert('Profile saved');
};

// Add Scholarship (Admin)
document.getElementById('addScholarshipBtn').onclick = async () => {
    const user = auth.currentUser;
    if(!user || user.email !== adminEmail){ alert('Only admin can add scholarships'); return; }
    const s = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        country: document.getElementById('countryScholarship').value,
        field: document.getElementById('fieldScholarship').value,
        level: document.getElementById('levelScholarship').value,
        minAge: document.getElementById('minAge').value,
        maxAge: document.getElementById('maxAge').value,
        grade: document.getElementById('gradeScholarship').value,
        deadline: document.getElementById('deadline').value,
        link: document.getElementById('link').value
    };
    await addDoc(collection(db,'scholarships'),s);
    alert('Scholarship added');
    loadScholarships();
};

// Load Scholarships
async function loadScholarships(){
    const list = document.getElementById('scholarship-list');
    list.innerHTML = '';
    const snapshot = await getDocs(collection(db,'scholarships'));
    snapshot.forEach(docSnap => {
        const s = docSnap.data();
        const div = document.createElement('div');
        div.className = 'scholarship';
        div.innerHTML = `<h4>${s.title}</h4><p>${s.description}</p><p><b>Country:</b> ${s.country}</p><p><b>Field:</b> ${s.field}</p><p><b>Level:</b> ${s.level}</p><p><b>Age:</b> ${s.minAge} - ${s.maxAge}</p><p><b>Grade:</b> ${s.grade}</p><p><b>Deadline:</b> ${s.deadline}</p><a href='${s.link}' target='_blank'>Apply</a>`;
        list.appendChild(div);
    });
}

// Auth State
onAuthStateChanged(auth,user=>{
    if(user){
        document.getElementById('user-section').style.display='block';
        document.getElementById('welcome').innerText='Welcome '+user.email;
        if(user.email===adminEmail){ document.getElementById('admin-section').style.display='block'; }
        loadScholarships();
    } else {
        document.getElementById('user-section').style.display='none';
        document.getElementById('admin-section').style.display='none';
    }
});

</script>
</body>
</html>
