<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholar Match</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Montserrat',sans-serif;
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:url('https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
background-size:cover;
}

.container{
background:rgba(255,255,255,0.95);
padding:40px;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
width:320px;
text-align:center;
}

input{
padding:12px;
margin:8px;
border-radius:8px;
border:1px solid #ddd;
width:90%;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#6C63FF;
color:white;
cursor:pointer;
font-weight:600;
margin:5px;
}

button:hover{
background:#574fd6;
}

</style>
</head>

<body>

<div class="container">

<h1>Scholar Match</h1>

<input id="email" type="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button id="loginBtn">Login</button>
<button id="signupBtn">Sign Up</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
authDomain: "scholarship-platform-ec01f.firebaseapp.com",
projectId: "scholarship-platform-ec01f",
storageBucket: "scholarship-platform-ec01f.firebasestorage.app",
messagingSenderId: "807575045909",
appId: "1:807575045909:web:9a61a548638423d7988b1c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const email=document.getElementById("email");
const password=document.getElementById("password");

document.getElementById("signupBtn").onclick=async()=>{

try{
await createUserWithEmailAndPassword(auth,email.value,password.value);
window.location="dashboard.html";
}catch(e){alert(e.message)}

}

document.getElementById("loginBtn").onclick=async()=>{

try{
await signInWithEmailAndPassword(auth,email.value,password.value);
window.location="dashboard.html";
}catch(e){alert(e.message)}

}

</script>

</body>
</html>
