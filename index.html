<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholar Match Pro+</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#eef2ff;}
.container{max-width:1100px;margin:auto;padding:20px;}
.hero{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;padding:60px 20px;border-radius:20px;text-align:center;}
.hero h1{margin:0;font-size:42px;}
.hero p{margin-top:10px;font-size:18px;opacity:0.9;}
input,select{padding:12px;margin:6px 0;border-radius:10px;border:1px solid #ddd;width:100%;max-width:320px;}
button{padding:12px 20px;border:none;border-radius:10px;background:#4f46e5;color:white;cursor:pointer;font-weight:500;}
.card{background:white;padding:18px;margin:10px;border-radius:15px;box-shadow:0 6px 15px rgba(0,0,0,0.08);transition:0.2s;}
.card:hover{transform:translateY(-4px);}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px;}
.locked{opacity:0.6;}
.premium-box{border:2px dashed #4f46e5;background:#fafaff;}
.badge{background:#4f46e5;color:white;padding:4px 10px;border-radius:20px;font-size:12px;display:inline-block;margin-bottom:8px;}
.countdown{font-size:12px;color:#ef4444;margin-top:5px;}
</style>
</head>

<body>
<div class="container">

<div class="hero">
<h1>🎓 Scholar Match Pro+</h1>
<p><strong>Your AI assistant for getting funded</strong></p>
</div>

<div id="auth-section">
<h3>Login / Sign Up</h3>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="user-section" style="display:none;">
<h2 id="welcome"></h2>

<div class="card">
<h3>🎯 Your Profile</h3>
<select id="userLevel">
<option>High School</option>
<option>College</option>
<option>University</option>
</select>
<button onclick="saveProfile()">Save Profile</button>
</div>

<div class="card premium-box">
<h3>💎 Premium (R50)</h3>
<p id="premiumStatus"></p>
<p>
✔ Smart matching<br>
✔ Deadline alerts<br>
✔ AI application help<br>
✔ Exclusive scholarships
</p>
<button onclick="fakeUpgrade()">Upgrade (Test Mode)</button>
</div>

<div id="admin-section" class="card" style="display:none;">
<h3>👑 Add Scholarship</h3>
<input id="title" placeholder="Title"><br>
<input id="description" placeholder="Description"><br>
<input id="link" placeholder="Application Link"><br>
<input id="deadline" type="date"><br>
<select id="levelScholarship">
<option>High School</option>
<option>College</option>
<option>University</option>
</select>
<select id="typeScholarship">
<option value="free">Free</option>
<option value="premium">Premium</option>
</select>
<button onclick="addScholarship()">Add Scholarship</button>
</div>

<h3>Scholarships For You</h3>
<div id="list" class="grid"></div>

<!-- AI HELP -->
<div class="card">
<h3>🤖 AI Application Helper</h3>
<input id="aiInput" placeholder="e.g. Write me a motivation letter">
<button onclick="aiHelp()">Generate</button>
<p id="aiOutput"></p>
</div>

<button onclick="logout()">Logout</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
authDomain: "scholarship-platform-ec01f.firebaseapp.com",
projectId: "scholarship-platform-ec01f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const authSection = document.getElementById("auth-section");
const userSection = document.getElementById("user-section");
const welcome = document.getElementById("welcome");
const list = document.getElementById("list");
const premiumStatus = document.getElementById("premiumStatus");
const adminSection = document.getElementById("admin-section");

const adminEmail = "lethabophenyo53@gmail.com";

window.signup = async () => {
const userCred = await createUserWithEmailAndPassword(auth,email.value,password.value);
await setDoc(doc(db,"profiles",userCred.user.uid),{
email:userCred.user.email,
premium:false,
level:""
});
};

window.login = async () => {
await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth, async (user)=>{
if(user){
authSection.style.display="none";
userSection.style.display="block";
welcome.innerText="Welcome " + user.email;
if(user.email === adminEmail){adminSection.style.display="block";}

const snap = await getDoc(doc(db,"profiles",user.uid));
window.userProfile = snap.data();
window.isPremiumUser = snap.data().premium;

premiumStatus.innerText = window.isPremiumUser ? "💎 Premium User" : "Free User";

loadScholarships();
}else{
authSection.style.display="block";
userSection.style.display="none";
adminSection.style.display="none";
}
});

window.saveProfile = async () => {
const user = auth.currentUser;
await updateDoc(doc(db,"profiles",user.uid),{level:userLevel.value});
alert("Profile saved 🎯");
loadScholarships();
};

window.fakeUpgrade = async () => {
const user = auth.currentUser;
await updateDoc(doc(db,"profiles",user.uid),{premium:true});
alert("Premium activated 🎉");
location.reload();
};

window.addScholarship = async () => {
await addDoc(collection(db,"scholarships"),{
title:title.value,
description:description.value,
link:link.value,
deadline:deadline.value,
level:levelScholarship.value,
type:typeScholarship.value
});
alert("Added 🎉");
loadScholarships();
};

function getCountdown(deadline){
const now = new Date();
const end = new Date(deadline);
const diff = end - now;
if(diff <= 0) return "Closed";
const days = Math.floor(diff/(1000*60*60*24));
return days + " days left";
}

window.loadScholarships = async () => {
list.innerHTML="Loading...";
const snapshot = await getDocs(collection(db,"scholarships"));
list.innerHTML="";

snapshot.forEach(docSnap=>{
const s = docSnap.data();
if(window.userProfile.level && s.level !== window.userProfile.level) return;

const locked = (s.type === "premium" && !window.isPremiumUser);

list.innerHTML += `
<div class="card ${locked ? "locked": ""}">
<span class="badge">${s.level}</span>
<h4>${s.title}</h4>
<p>${s.description}</p>
<p class="countdown">⏳ ${getCountdown(s.deadline)}</p>
${locked ? "<p>🔒 Premium Only – Exclusive match</p>" : `<a href="${s.link}" target="_blank">Apply Now</a>`}
</div>`;
});
};

window.aiHelp = () => {
const input = document.getElementById("aiInput").value;
document.getElementById("aiOutput").innerText =
"Here is a strong answer: " + input + ". I am a hardworking and passionate student who is committed to achieving academic excellence and making a positive impact.";
};

</script>
</body>
</html>
