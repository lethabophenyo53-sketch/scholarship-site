<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholar Match</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:#f5f7fb;
color:#333;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* HERO */
.hero{
background:linear-gradient(135deg,#4f46e5,#7c3aed);
color:white;
padding:60px 20px;
border-radius:15px;
text-align:center;
margin-bottom:30px;
}

.hero h1{
font-size:40px;
}

.hero p{
opacity:0.9;
}

/* AUTH */
.auth-box{
text-align:center;
margin-bottom:20px;
}

input, select{
padding:10px;
margin:8px;
border-radius:8px;
border:1px solid #ddd;
width:250px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#4f46e5;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* CARDS */
.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.scholarship{
overflow:hidden;
transition:0.3s;
}

.scholarship img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

.scholarship:hover{
transform:translateY(-5px);
}

.locked{
opacity:0.5;
}

#user-section, #admin-section{
display:none;
}

/* PREMIUM */
.premium{
border:2px dashed #10b981;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>🎓 Scholar Match</h1>
<p>Discover Scholarships That Fit You</p>
</div>

<!-- AUTH -->
<div id="auth-section" class="auth-box">
<h3>Login / Sign Up</h3>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button id="signupBtn">Sign Up</button>
<button id="loginBtn">Login</button>
</div>

<!-- USER -->
<div id="user-section">

<h2 id="welcome"></h2>

<div class="card">
<h3>Your Profile</h3>
<input id="country" placeholder="Country"><br>

<select id="level">
<option value="">Select Level</option>
<option>Primary School</option>
<option>High School</option>
<option>College</option>
<option>University</option>
</select><br>

<button onclick="saveProfile()">Save Profile</button>
</div>

<div class="card premium">
<h3>💎 Premium</h3>
<p id="premium-status">Free User</p>
<button onclick="activatePremium()">Unlock Premium</button>
</div>

<h3>Available Scholarships</h3>
<div id="scholarship-list" class="grid"></div>

<!-- ADMIN -->
<div id="admin-section" class="card">
<h3>Add Scholarship</h3>
<input id="title" placeholder="Title"><br>
<input id="description" placeholder="Description"><br>
<input id="link" placeholder="Application Link"><br>

<select id="levelScholarship">
<option>Primary School</option>
<option>High School</option>
<option>College</option>
<option>University</option>
</select><br>

<button id="addScholarshipBtn">Add Scholarship</button>
</div>

<button id="logoutBtn">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, setDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
authDomain: "scholarship-platform-ec01f.firebaseapp.com",
projectId: "scholarship-platform-ec01f",
storageBucket: "scholarship-platform-ec01f.appspot.com",
messagingSenderId: "807575045909",
appId: "1:807575045909:web:9a61a548638423d7988b1c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const adminEmail = "lethabophenyo53@gmail.com";

/* ELEMENTS */
const email = document.getElementById("email");
const password = document.getElementById("password");
const authSection = document.getElementById("auth-section");
const userSection = document.getElementById("user-section");
const adminSection = document.getElementById("admin-section");
const welcome = document.getElementById("welcome");
const scholarshipList = document.getElementById("scholarship-list");
const premiumStatus = document.getElementById("premium-status");

/* AUTH */
signupBtn.onclick = async () => {
if(!email.value || !password.value){
alert("Fill all fields");
return;
}
await createUserWithEmailAndPassword(auth,email.value,password.value);
};

loginBtn.onclick = async () => {
if(!email.value || !password.value){
alert("Fill all fields");
return;
}
await signInWithEmailAndPassword(auth,email.value,password.value);
};

logoutBtn.onclick = () => signOut(auth);

/* AUTH STATE */
onAuthStateChanged(auth, async (user) => {

if(user){
authSection.style.display="none";
userSection.style.display="block";

welcome.innerText="Welcome " + user.email;

adminSection.style.display = user.email === adminEmail ? "block" : "none";

/* PROFILE */
const ref = doc(db,"profiles",user.uid);
const snap = await getDoc(ref);

window.isPremiumUser = snap.exists() ? snap.data().premium : false;

premiumStatus.innerText = window.isPremiumUser ? "💎 Premium User" : "Free User";

loadScholarships();

}else{
authSection.style.display="block";
userSection.style.display="none";
adminSection.style.display="none";
}

});

/* PROFILE SAVE */
window.saveProfile = async () => {
const user = auth.currentUser;

const ref = doc(db,"profiles",user.uid);
const snap = await getDoc(ref);

let premium = snap.exists() ? snap.data().premium : false;

await setDoc(ref,{
country:country.value,
level:level.value,
premium:premium
});

alert("Profile Saved ✅");
};

/* PREMIUM */
window.activatePremium = async () => {
const user = auth.currentUser;

await setDoc(doc(db,"profiles",user.uid),{
premium:true
},{merge:true});

window.isPremiumUser = true;
premiumStatus.innerText = "💎 Premium User";

loadScholarships();
};

/* ADD SCHOLARSHIP */
addScholarshipBtn.onclick = async () => {
await addDoc(collection(db,"scholarships"),{
title:title.value,
description:description.value,
link:link.value,
level:levelScholarship.value,
image:"https://images.unsplash.com/photo-1523050854058-8df90110c9f1"
});

alert("Added ✅");
loadScholarships();
};

/* LOAD SCHOLARSHIPS */
async function loadScholarships(){

scholarshipList.innerHTML="Loading...";

const snapshot = await getDocs(collection(db,"scholarships"));

scholarshipList.innerHTML="";

snapshot.forEach(docSnap=>{
const s = docSnap.data();

const locked = (s.level==="University" && !window.isPremiumUser);

const div=document.createElement("div");
div.className="card scholarship " + (locked ? "locked":"");

div.innerHTML=`
<img src="${s.image}" />
<h4>${s.title}</h4>
<p>${s.description}</p>
${locked ? "🔒 Premium Only" : `<a href="${s.link}" target="_blank">Apply</a>`}
`;

scholarshipList.appendChild(div);
});

}

</script>

</body>
</html>
