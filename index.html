<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholar Match</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Montserrat',sans-serif;
margin:0;
background:linear-gradient(135deg,#4c1d95,#7c3aed);
min-height:100vh;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
background:white;
border-radius:12px;
margin-top:40px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

.hero{
text-align:center;
padding:50px;
background:linear-gradient(135deg,#7c3aed,#9333ea);
color:white;
border-radius:10px;
margin-bottom:30px;
}

input{
padding:12px;
margin:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#7c3aed;
color:white;
cursor:pointer;
}

button:hover{
background:#6d28d9;
}

.scholarship-list{
display:flex;
flex-wrap:wrap;
}

.scholarship{
width:260px;
border:1px solid #eee;
padding:15px;
margin:10px;
border-radius:10px;
background:#faf5ff;
}

#user-section{
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>Scholar Match</h1>
<p>Find scholarships for Primary, High School & University students</p>
</div>

<h3>Login / Signup</h3>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button id="signupBtn">Sign Up</button>
<button id="loginBtn">Login</button>

<div id="user-section">

<h2 id="welcome"></h2>

<h3>Add Scholarship</h3>

<input id="title" placeholder="Scholarship title"><br>
<input id="description" placeholder="Description"><br>
<input id="country" placeholder="Country"><br>
<input id="field" placeholder="Field"><br>
<input id="degree" placeholder="Degree"><br>
<input id="link" placeholder="Application link"><br>

<button id="addScholarshipBtn">Add Scholarship</button>

<h3>Scholarships</h3>

<div id="scholarship-list" class="scholarship-list"></div>

<br>

<button id="logoutBtn">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "PASTE_API_KEY_HERE",

authDomain: "PASTE_AUTH_DOMAIN",

projectId: "PASTE_PROJECT_ID",

storageBucket: "PASTE_BUCKET",

messagingSenderId: "PASTE_ID",

appId: "PASTE_APP_ID"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const email = document.getElementById("email");
const password = document.getElementById("password");

document.getElementById("signupBtn").onclick = async () => {

try{

await createUserWithEmailAndPassword(auth,email.value,password.value);

alert("Account created");

}catch(e){

alert(e.message)

}

}

document.getElementById("loginBtn").onclick = async () => {

try{

await signInWithEmailAndPassword(auth,email.value,password.value);

}catch(e){

alert(e.message)

}

}

document.getElementById("logoutBtn").onclick = () => {

signOut(auth)

}

onAuthStateChanged(auth,user=>{

if(user){

document.getElementById("user-section").style.display="block";

document.getElementById("welcome").innerText="Welcome "+user.email;

loadScholarships();

}

else{

document.getElementById("user-section").style.display="none";

}

})

document.getElementById("addScholarshipBtn").onclick = async () => {

const title=document.getElementById("title").value;

const description=document.getElementById("description").value;

const country=document.getElementById("country").value;

const field=document.getElementById("field").value;

const degree=document.getElementById("degree").value;

const link=document.getElementById("link").value;

try{

await addDoc(collection(db,"scholarships"),{

title,description,country,field,degree,link

})

alert("Scholarship added")

loadScholarships()

}catch(e){

alert(e.message)

}

}

async function loadScholarships(){

const list=document.getElementById("scholarship-list");

list.innerHTML="";

const querySnapshot=await getDocs(collection(db,"scholarships"));

querySnapshot.forEach(doc=>{

const s=doc.data();

const div=document.createElement("div");

div.className="scholarship";

div.innerHTML=`

<h4>${s.title}</h4>

<p>${s.description}</p>

<p><b>Country:</b> ${s.country}</p>

<p><b>Field:</b> ${s.field}</p>

<p><b>Degree:</b> ${s.degree}</p>

<a href="${s.link}" target="_blank">Apply</a>

`;

list.appendChild(div);

})

}

</script>

</body>
</html>
