<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholar Match Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Montserrat;
margin:0;
background:#f5f5f5;
}

header{
background:#6C63FF;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

input,select{
padding:10px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#6C63FF;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.scholarship{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.grid{
display:flex;
flex-wrap:wrap;
}

</style>

</head>

<body>

<header>
<h2>Scholar Match</h2>
<button id="logoutBtn">Logout</button>
</header>

<div class="container">

<h3>Your Profile</h3>

<input id="country" placeholder="Country"><br>

<select id="level">
<option>Primary School</option>
<option>High School</option>
<option>College</option>
<option>University</option>
</select>

<select id="qualification">
<option>Certificate</option>
<option>Diploma</option>
<option>Degree</option>
</select>

<input id="age" placeholder="Age"><br>
<input id="grade" placeholder="Grade"><br>

<button onclick="saveProfile()">Save Profile</button>

<h3>Scholarships</h3>

<div id="scholarshipList" class="grid"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,signOut,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,collection,getDocs,setDoc,doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
authDomain: "scholarship-platform-ec01f.firebaseapp.com",
projectId: "scholarship-platform-ec01f",
storageBucket: "scholarship-platform-ec01f.firebasestorage.app",
messagingSenderId: "807575045909",
appId: "1:807575045909:web:9a61a548638423d7988b1c"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

const list=document.getElementById("scholarshipList");

onAuthStateChanged(auth,user=>{

if(!user){
window.location="index.html";
}else{
loadScholarships();
}

})

document.getElementById("logoutBtn").onclick=()=>{
signOut(auth)
window.location="index.html"
}

async function loadScholarships(){

const snapshot=await getDocs(collection(db,"scholarships"))

snapshot.forEach(doc=>{

const s=doc.data()

const card=document.createElement("div")

card.className="scholarship"

card.innerHTML=`

<h4>${s.title}</h4>
<p>${s.description}</p>
<p><b>Country:</b> ${s.country}</p>
<p><b>Level:</b> ${s.level}</p>
<a href="${s.link}" target="_blank">Apply</a>

`

list.appendChild(card)

})

}

window.saveProfile=async()=>{

const user=auth.currentUser

await setDoc(doc(db,"profiles",user.uid),{

country:country.value,
level:level.value,
qualification:qualification.value,
age:age.value,
grade:grade.value

})

alert("Profile saved")

}

</script>

</body>
</html>
