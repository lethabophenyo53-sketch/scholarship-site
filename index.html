<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholar Match</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Montserrat',sans-serif;
margin:0;
padding:0;
background:url('https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
background-size:cover;
}

.container{
max-width:1100px;
margin:auto;
background:rgba(255,255,255,0.95);
padding:30px;
margin-top:40px;
border-radius:12px;
}

.hero{
text-align:center;
background:rgba(27,31,59,0.85);
color:white;
padding:50px;
border-radius:10px;
margin-bottom:30px;
}

.auth{
text-align:center;
margin-bottom:30px;
}

.auth input{
padding:10px;
margin:6px;
width:250px;
}

button{
padding:10px 18px;
margin:6px;
background:#6C63FF;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#user-section{
display:none;
text-align:center;
}

.scholarship{
background:white;
padding:15px;
margin:10px;
border-radius:8px;
border:1px solid #ddd;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>Scholar Match</h1>
<p>Find Scholarships Easily</p>
</div>

<!-- LOGIN -->

<div class="auth" id="auth-section">

<h3>Login / Sign Up</h3>

<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>

<button id="signupBtn">Sign Up</button>
<button id="loginBtn">Login</button>

</div>

<!-- USER AREA -->

<div id="user-section">

<h2 id="welcome"></h2>

<h3>Premium Subscription</h3>

<button onclick="subscribe('monthly')">
Monthly Plan
</button>

<button onclick="subscribe('yearly')">
Yearly Plan
</button>

<p id="premiumStatus"></p>

<h3>Scholarships</h3>

<div id="scholarship-list"></div>

<button id="logoutBtn">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,signOut,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,collection,getDocs,setDoc,doc,getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("signupBtn").onclick = async ()=>{
await createUserWithEmailAndPassword(auth,email.value,password.value);
};

document.getElementById("loginBtn").onclick = async ()=>{
await signInWithEmailAndPassword(auth,email.value,password.value);
};

document.getElementById("logoutBtn").onclick = ()=>{
signOut(auth);
};

onAuthStateChanged(auth,async user=>{

if(user){

document.getElementById("auth-section").style.display="none";
document.getElementById("user-section").style.display="block";
document.getElementById("welcome").innerText="Welcome "+user.email;

checkPremium(user);

loadScholarships();

}else{

document.getElementById("auth-section").style.display="block";
document.getElementById("user-section").style.display="none";

}

});

async function checkPremium(user){

const profile = await getDoc(doc(db,"profiles",user.uid));

if(profile.exists() && profile.data().premium){

document.getElementById("premiumStatus").innerText="✨ Premium Active";

}else{

document.getElementById("premiumStatus").innerText="Standard Account";

}

}

async function loadScholarships(){

const list=document.getElementById("scholarship-list");
list.innerHTML="";

const snapshot=await getDocs(collection(db,"scholarships"));

snapshot.forEach(doc=>{

const s=doc.data();

const div=document.createElement("div");
div.className="scholarship";

div.innerHTML=`
<h4>${s.title}</h4>
<p>${s.description}</p>
`;

list.appendChild(div);

});

}

/* PREMIUM BUTTON (NEXT STEP WILL CONNECT PAYFAST) */

window.subscribe = (type)=>{

alert("Payment integration will be connected next step with PayFast.");

};

</script>

</body>
</html>
