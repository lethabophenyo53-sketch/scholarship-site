<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholar Match</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* ---------- General Styles ---------- */
body {
    font-family: 'Montserrat', sans-serif;
    margin: 0;
    padding: 0;
    background: url('https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
    background-size: cover;
    color: #333;
    scroll-behavior: smooth;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 30px;
    background: rgba(255,255,255,0.95);
    border-radius: 15px;
    box-shadow: 0px 8px 25px rgba(0,0,0,0.3);
}

/* ---------- Hero Banner ---------- */
.hero-banner {
    text-align: center;
    padding: 70px 20px;
    background: rgba(27,31,59,0.85);
    border-radius: 12px;
    margin-bottom: 40px;
}
.hero-banner h1 {
    color: #fff;
    font-size: 60px;
    margin-bottom: 20px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
}
.hero-banner p {
    color: #ddd;
    font-size: 20px;
    margin-bottom: 30px;
    text-shadow: 1px 1px 8px rgba(0,0,0,0.5);
}
.hero-banner button {
    padding: 18px 40px;
    font-size: 18px;
    border-radius: 50px;
    background: linear-gradient(135deg,#6C63FF,#4CAF50);
    border: none;
    color: white;
    cursor: pointer;
    font-weight: 700;
    box-shadow: 0px 6px 20px rgba(0,0,0,0.4);
    transition: 0.3s;
}
.hero-banner button:hover {
    transform: scale(1.05);
    box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
}

/* ---------- Headings ---------- */
h1,h2,h3,h4 { color: #1B1F3B; }

/* ---------- Input & Button Styles ---------- */
input, select {
    padding: 12px;
    margin: 5px 0;
    width: 240px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}
button {
    padding: 12px 25px;
    margin: 5px;
    background: linear-gradient(135deg, #6C63FF, #4CAF50);
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    font-weight: 600;
    transition: 0.3s;
}
button:hover {
    transform: scale(1.05);
    box-shadow: 0px 6px 20px rgba(0,0,0,0.4);
}

/* ---------- Scholarship Cards ---------- */
.scholarship {
    background: white;
    margin: 15px;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
    display: inline-block;
    width: 300px;
    vertical-align: top;
    transition: 0.3s;
}
.scholarship:hover {
    transform: translateY(-7px);
    box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
}
.scholarship h4 { margin: 10px 0; font-size: 20px; }
.scholarship p { font-size: 14px; color: #555; }

/* ---------- Flex Layout ---------- */
.scholarship-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

/* ---------- Hidden Sections ---------- */
#user-section, #admin-section { display: none; }

/* ---------- Responsive ---------- */
@media (max-width: 768px){
    .scholarship { width: 90%; margin: 10px auto; }
    input { width: 90%; }
    .hero-banner h1 { font-size: 40px; }
    .hero-banner p { font-size: 16px; }
    .hero-banner button { padding: 15px 30px; font-size: 16px; }
}
</style>
</head>
<body>

<div class="container">

<div class="hero-banner">
<h1>Scholar Match</h1>
<p>Find scholarships for Primary, High School & University students</p>
<button onclick="document.getElementById('scholarship-list').scrollIntoView({behavior:'smooth'});">Get Started Now</button>
</div>

<!-- -------- Authentication -------- -->
<div id="auth-section">
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="signUp()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- -------- User Section -------- -->
<div id="user-section">

<h2 id="welcome"></h2>

<h3>Your Profile</h3>
<input type="text" id="country" placeholder="Country"><br>
<input type="text" id="field" placeholder="Field of Study"><br>
<input type="text" id="degree" placeholder="Degree Level"><br>
<input type="number" id="age" placeholder="Age"><br>
<input type="text" id="grade" placeholder="Grade (e.g., Grade 6, Grade 12, N/A)"><br>
<button onclick="saveProfile()">Save Profile</button>

<br><h3>Available Scholarships</h3>
<h4>Filter Scholarships</h4>
<input type="text" id="filterCountry" placeholder="Filter by Country">
<input type="text" id="filterField" placeholder="Filter by Field">
<input type="text" id="filterDegree" placeholder="Filter by Degree">
<input type="number" id="filterAge" placeholder="Filter by Age">
<input type="text" id="filterGrade" placeholder="Filter by Grade"><br>
<button onclick="filterScholarships()">Apply Filter</button>
<button onclick="loadScholarships()">Clear Filter</button>

<br><br>
<input type="text" id="search" placeholder="Search scholarships..." onkeyup="searchScholarships()">

<br><button onclick="matchScholarships()">Find Matching Scholarships</button>

<br><br>
<div id="scholarship-list" class="scholarship-list"></div>

<!-- -------- Admin Section -------- -->
<div id="admin-section">
<h3>Add Scholarship (Admin)</h3>
<input type="text" id="title" placeholder="Scholarship Title"><br>
<input type="text" id="description" placeholder="Description"><br>
<input type="text" id="countryScholarship" placeholder="Country"><br>
<input type="text" id="fieldScholarship" placeholder="Field of Study"><br>
<input type="text" id="degreeScholarship" placeholder="Degree Level"><br>
<input type="number" id="minAge" placeholder="Minimum Age"><br>
<input type="number" id="maxAge" placeholder="Maximum Age"><br>
<input type="text" id="gradeScholarship" placeholder="Grade (e.g., Grade 12, N/A)"><br>
<input type="date" id="deadline"><br>
<input type="text" id="link" placeholder="Application Link"><br>
<button onclick="addScholarship()">Add Scholarship</button>
</div>

<h3>Saved Scholarships</h3>
<div id="saved-list" class="scholarship-list"></div>

<br>
<button onclick="logout()">Logout</button>
</div>
</div>

</body>
</html>
