<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scholar Match Pro+ (Final Boss)</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#eef2ff;
}

.app{
max-width:430px;
margin:auto;
min-height:100vh;
background:#fff;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
position:relative;
overflow:hidden;
}

.header{
background:linear-gradient(135deg,#4f46e5,#7c3aed);
color:white;
padding:18px;
text-align:center;
font-weight:700;
}

.content{
padding:14px;
padding-bottom:90px;
}

.section{display:none;}
.active{display:block;}

.card{
background:white;
padding:14px;
margin:10px 0;
border-radius:16px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

input,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:6px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
font-weight:600;
}

button:hover{opacity:0.9;cursor:pointer;}

.nav{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:430px;
max-width:100%;
display:flex;
background:white;
box-shadow:0 -5px 20px rgba(0,0,0,0.1);
}

.nav button{
flex:1;
background:none;
color:#4f46e5;
font-size:11px;
padding:10px;
}

.badge{
background:#4f46e5;
color:white;
padding:3px 8px;
border-radius:20px;
font-size:11px;
}

.locked{opacity:0.5;}
.small{font-size:12px;color:#ef4444;}
.premium{border:2px dashed #4f46e5;background:#fafaff;}
</style>
</head>

<body>

<div class="app">
<div class="header">🎓 Scholar Match Pro+ FINAL BOSS</div>

<div class="content">

<!-- AUTH -->
<div id="auth" class="section active">
<h3>Welcome</h3>
<input id="email" placeholder="Email" />
<input id="password" type="password" placeholder="Password" />
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- HOME -->
<div id="home" class="section">
<h3 id="welcome"></h3>

<div class="card">
<h4>🎯 Profile Level</h4>
<select id="level">
<option>Primary School</option>
<option>High School</option>
<option>College</option>
<option>University</option>
</select>
<button onclick="saveProfile()">Save Profile</button>
</div>

<div class="card premium">
<h4>💎 Premium Upgrade</h4>
<p id="status">Free User</p>
<button onclick="pay()">Upgrade R50</button>
</div>
</div>

<!-- SCHOLARSHIPS -->
<div id="funding" class="section">
<h3>Scholarships & Funding</h3>
<div id="list"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<h3>📊 Dashboard</h3>
<div class="card">
<p>Applications: <span id="apps">0</span></p>
<p>Saved: <span id="saved">0</span></p>
<button onclick="notify()">Enable Alerts</button>
</div>
</div>

<!-- AI -->
<div id="ai" class="section">
<h3>🤖 AI Helper</h3>
<input id="aiInput" placeholder="Ask for help..." />
<button onclick="ai()">Generate</button>
<p id="aiOut"></p>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
<h3>Admin Panel</h3>
<input id="title" placeholder="Title" />
<input id="desc" placeholder="Description" />
<input id="link" placeholder="Link" />
<input id="deadline" type="date" />
<select id="level">
<option>Primary School</option>
<option>High School</option>
<option>College</option>
<option>University</option>
<option>All</option>
</select>
<select id="type">
<option value="free">Free</option>
<option value="premium">Premium</option>
</select>
<button onclick="addScholarship()">Add Scholarship</button>
</div>

</div>

<div class="nav">
<button onclick="go('home')">Home</button>
<button onclick="go('funding')">Funding</button>
<button onclick="go('dashboard')">Dashboard</button>
<button onclick="go('ai')">AI</button>
<button onclick="go('admin')">Admin</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
authDomain: "scholarship-platform-ec01f.firebaseapp.com",
projectId: "scholarship-platform-ec01f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let profile;

function go(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

window.go = go;

window.signup = async () => {
const u = await createUserWithEmailAndPassword(auth,email.value,password.value);
await setDoc(doc(db,"profiles",u.user.uid),{
premium:false,
level:"Primary School",
apps:0
});
};

window.login = () => signInWithEmailAndPassword(auth,email.value,password.value);

onAuthStateChanged(auth, async (u)=>{
if(u){
go('home');
const snap = await getDoc(doc(db,"profiles",u.uid));
profile = snap.data();

welcome.innerText = "Welcome " + u.email;
status.innerText = profile.premium ? "Premium User 💎" : "Free User";
loadScholarships();
}else{
go('auth');
}
});

window.saveProfile = async () => {
await updateDoc(doc(db,"profiles",auth.currentUser.uid),{level:level.value});
loadScholarships();
};

window.pay = () => {
window.open("https://www.payfast.co.za/","_blank");
};

function countdown(d){
const diff = new Date(d)-new Date();
if(diff<=0) return "Closed";
return Math.floor(diff/86400000)+" days left";
}

window.loadScholarships = async () => {
list.innerHTML="";
const snap = await getDocs(collection(db,"scholarships"));

snap.forEach(s=>{
const d = s.data();

if(profile.level && d.level !== profile.level && d.level !== "All") return;

const locked = d.type === "premium" && !profile.premium;

list.innerHTML += `
<div class="card ${locked?'locked':''}">
<span class="badge">${d.level}</span>
<h4>${d.title}</h4>
<p>${d.desc}</p>
<p class="small">⏳ ${countdown(d.deadline)}</p>
${locked ? "🔒 Premium Only" : "<a href='"+d.link+"' target='_blank'>Apply</a>"}
</div>`;
});
};

window.addScholarship = async () => {
await addDoc(collection(db,"scholarships"),{
title:title.value,
desc:desc.value,
link:link.value,
deadline:deadline.value,
type:type.value,
level:level.value
});
loadScholarships();
};

window.ai = () => {
aiOut.innerText = "AI: " + aiInput.value + " — You are capable, start applying now.";
};

window.notify = () => {
Notification.requestPermission().then(p=>{
if(p==='granted') new Notification("Scholar Match Pro+",{body:"New opportunities available"});
});
};
</script>

</body>
</html>
