<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholar Match</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Montserrat', sans-serif;
  margin: 0;
  padding: 0;
  background: url('https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
  background-size: cover;
  color: #333;
  scroll-behavior: smooth;
}
.container{
  max-width:1100px;
  margin:auto;
  background:rgba(255,255,255,0.95);
  padding:30px;
  margin-top:40px;
  border-radius:12px;
  box-shadow:0 10px 40px rgba(0,0,0,0.25);
}
.hero{
  text-align:center;
  background:rgba(27,31,59,0.85);
  color:white;
  padding:60px;
  border-radius:10px;
  margin-bottom:40px;
}
.hero button{
  margin-top:20px;
  padding:14px 28px;
  font-size:18px;
  cursor:pointer;
}
.auth{
  text-align:center;
  margin-bottom:40px;
}
input, select{
  padding:12px;
  margin:8px;
  border-radius:8px;
  border:1px solid #ddd;
  width:240px;
}
button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#6C63FF;
  color:white;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}
button:hover{
  transform:scale(1.05);
  background:#574fd6;
}
.scholarship-list{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}
.scholarship{
  background:white;
  border:1px solid #ddd;
  padding:15px;
  margin:10px;
  border-radius:10px;
  width:260px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
#user-section{
  display:none;
  text-align:center;
}
</style>
</head>
<body>
<div class="container">
<div class="hero">
<h1>Scholar Match</h1>
<p>Find scholarships for Primary, High School, College & University students</p>
<button onclick="document.getElementById('auth-section').scrollIntoView({behavior:'smooth'});">Get Started Now</button>
</div>

<!-- LOGIN / SIGNUP -->
<div class="auth" id="auth-section">
<h3>Login / Sign Up</h3>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button id="signupBtn">Sign Up</button>
<button id="loginBtn">Login</button>
</div>

<!-- USER SECTION -->
<div id="user-section">
<h2 id="welcome"></h2>

<h3>Your Profile</h3>
<input type="text" id="country" placeholder="Country"><br>
<input type="text" id="field" placeholder="Field of Study"><br>
<select id="level">
  <option value="">Select Level</option>
  <option>Primary School</option>
  <option>High School</option>
  <option>Certificate</option>
  <option>Diploma</option>
  <option>Degree </option>
  <option>College</option>
  <option>University</option>
</select><br>
<input type="number" id="age" placeholder="Age"><br>
<button onclick="saveProfile()">Save Profile</button>

<h3>Available Scholarships</h3>
<input type="text" id="filterCountry" placeholder="Filter by Country">
<input type="text" id="filterField" placeholder="Filter by Field">
<select id="filterLevel">
  <option value="">Filter by Level</option>
  <option>Primary School</option>
  <option>High School</option>
  <option>Certificate</option>
  <option>Diploma</option>
  <option>Degree</option>
  <option>College</option>
  <option>University</option>
</select><br>
<button onclick="filterScholarships()">Apply Filter</button>
<button onclick="loadScholarships()">Clear Filter</button>

<div id="scholarship-list" class="scholarship-list"></div>

<h3>Add Scholarship (Admin)</h3>
<input type="text" id="title" placeholder="Scholarship Title"><br>
<input type="text" id="description" placeholder="Description"><br>
<input type="text" id="countryScholarship" placeholder="Country"><br>
<input type="text" id="fieldScholarship" placeholder="Field of Study"><br>
<select id="levelScholarship">
  <option value="">Select Level</option>
  <option>Primary School</option>
  <option>High School</option>
  <option>Certificate</option>
  <option>Diploma</option>
  <option>Degree</option>
  <option>College</option>
  <option>University</option>
</select><br>
<input type="number" id="minAge" placeholder="Minimum Age"><br>
<input type="number" id="maxAge" placeholder="Maximum Age"><br>
<input type="date" id="deadline"><br>
<input type="text" id="link" placeholder="Application Link"><br>
<button id="addScholarshipBtn">Add Scholarship</button>
<br><br>
<button id="logoutBtn">Logout</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
authDomain: "scholarship-platform-ec01f.firebaseapp.com",
projectId: "scholarship-platform-ec01f",
storageBucket: "scholarship-platform-ec01f.firebasestorage.app",
messagingSenderId: "807575045909",
appId: "1:807575045909:web:9a61a548638423d7988b1c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const email = document.getElementById("email");
const password = document.getElementById("password");

// SIGN UP
document.getElementById("signupBtn").onclick = async () => {
  if(!email.value || !password.value){ alert("Enter email and password"); return; }
  try { await createUserWithEmailAndPassword(auth,email.value,password.value); alert("Account created"); } 
  catch(e){ alert(e.message); }
}

// LOGIN
document.getElementById("loginBtn").onclick = async () => {
  try { await signInWithEmailAndPassword(auth,email.value,password.value); } 
  catch(e){ alert(e.message); }
}

// LOGOUT
document.getElementById("logoutBtn").onclick = () => { signOut(auth); }

// AUTH STATE
onAuthStateChanged(auth,user=>{
  if(user){
    document.getElementById("user-section").style.display="block";
    document.getElementById("auth-section").style.display="none";
    document.getElementById("welcome").innerText="Welcome "+user.email;
    loadScholarships();
  } else { document.getElementById("user-section").style.display="none"; document.getElementById("auth-section").style.display="block"; }
});

// SAVE PROFILE
window.saveProfile = async () => {
  const country = document.getElementById("country").value;
  const field = document.getElementById("field").value;
  const level = document.getElementById("level").value;
  const age = document.getElementById("age").value;
  const user = auth.currentUser;
  if(!user){ alert("Login first"); return; }
  await setDoc(doc(db,"profiles",user.uid),{country,field,level,age});
  alert("Profile saved");
}

// ADD SCHOLARSHIP
document.getElementById("addScholarshipBtn").onclick = async () => {
  const title = document.getElementById("title").value;
  const description = document.getElementById("description").value;
  const country = document.getElementById("countryScholarship").value;
  const field = document.getElementById("fieldScholarship").value;
  const level = document.getElementById("levelScholarship").value;
  const minAge = document.getElementById("minAge").value;
  const maxAge = document.getElementById("maxAge").value;
  const deadline = document.getElementById("deadline").value;
  const link = document.getElementById("link").value;
  if(!title||!description){ alert("Fill required fields"); return; }
  await addDoc(collection(db,"scholarships"),{title,description,country,field,level,minAge,maxAge,deadline,link});
  alert("Scholarship added");
  loadScholarships();
}

// LOAD SCHOLARSHIPS
async function loadScholarships(){
  const list=document.getElementById("scholarship-list");
  list.innerHTML="";
  
  const user = auth.currentUser;
  if(!user) return;

  // Get user's profile
  const profileSnap = await getDoc(doc(db,"profiles",user.uid));
  const profile = profileSnap.exists() ? profileSnap.data() : {};

  const querySnapshot = await getDocs(collection(db,"scholarships"));
  querySnapshot.forEach(doc=>{
    const s = doc.data();
    
    // Matching logic
    let match = true;
    if(profile.country && s.country && s.country.toLowerCase() !== profile.country.toLowerCase()) match=false;
    if(profile.field && s.field && s.field.toLowerCase() !== profile.field.toLowerCase()) match=false;
    if(profile.level && s.level && s.level !== profile.level) match=false;
    if(profile.age && s.minAge && profile.age < s.minAge) match=false;
    if(profile.age && s.maxAge && profile.age > s.maxAge) match=false;
    
    if(match){
      const div = document.createElement("div");
      div.className="scholarship";
      div.innerHTML=`
        <h4>${s.title}</h4>
        <p>${s.description}</p>
        <p><b>Country:</b> ${s.country || "Any"}</p>
        <p><b>Field:</b> ${s.field || "Any"}</p>
        <p><b>Level:</b> ${s.level || "Any"}</p>
        <p><b>Age Range:</b> ${s.minAge || "-"} to ${s.maxAge || "-"}</p>
        <p><b>Deadline:</b> ${s.deadline || "Not specified"}</p>
        <a href="${s.link}" target="_blank"><button>Apply</button></a>
      `;
      list.appendChild(div);
      <button onclick="loadScholarships()">Match My Profile</button>
    }
  });
}

// FILTER SCHOLARSHIPS
window.filterScholarships = async () => {
  const countryF = document.getElementById("filterCountry").value.toLowerCase();
  const fieldF = document.getElementById("filterField").value.toLowerCase();
  const levelF = document.getElementById("filterLevel").value;
  const list = document.getElementById("scholarship-list");
  list.innerHTML="";
  const querySnapshot = await getDocs(collection(db,"scholarships"));
  querySnapshot.forEach(doc=>{
    const s = doc.data();
    let match = true;
    if(countryF && s.country && !s.country.toLowerCase().includes(countryF)) match=false;
    if(fieldF && s.field && !s.field.toLowerCase().includes(fieldF)) match=false;
    if(levelF && s.level && s.level!==levelF) match=false;
    if(match){
      const div = document.createElement("div");
      div.className="scholarship";
      div.innerHTML=`
        <h4>${s.title}</h4>
        <p>${s.description}</p>
        <p><b>Country:</b> ${s.country || "Any"}</p>
        <p><b>Field:</b> ${s.field || "Any"}</p>
        <p><b>Level:</b> ${s.level || "Any"}</p>
        <p><b>Age Range:</b> ${s.minAge || "-"} to ${s.maxAge || "-"}</p>
        <p><b>Deadline:</b> ${s.deadline || "Not specified"}</p>
        <a href="${s.link}" target="_blank"><button>Apply</button></a>
      `;
      list.appendChild(div);
    }
  });
}
</script>
</body>
</html>
