<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholar Match</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"> 
  <style> 
    
    /* ---------- General Styles ---------- */ 
body { font-family: 'Montserrat', sans-serif;
margin: 0;
padding: 0; 
background: url('https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed; background-size: cover; 
color: #333; 
scroll-behavior: smooth; 
      
  }

/* MAIN CONTAINER */
.container{
max-width:1100px;
margin:auto;
background:rgba(255,255,255,0.95);
padding:30px;
margin-top:40px;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
}

/* HERO SECTION */
.hero{
text-align:center;
background:rgba(27,31,59,0.85);
color:white;
padding:60px;
border-radius:10px;
margin-bottom:40px;
}

.hero button{
margin-top:20px;
padding:14px 28px;
font-size:18px;
}

/* CENTER LOGIN */
.auth{
text-align:center;
margin-bottom:40px;
}

/* INPUTS */
input{
padding:12px;
margin:8px;
border-radius:8px;
border:1px solid #ddd;
width:240px;
}

/* BUTTONS */
button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#6C63FF;
color:white;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
background:#574fd6;
}

/* SCHOLARSHIP CARDS */
.scholarship-list{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.scholarship{
background:white;
border:1px solid #ddd;
padding:15px;
margin:10px;
border-radius:10px;
width:260px;
}

/* USER AREA */
#user-section{
display:none;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>Scholar Match</h1>
<p>Find scholarships for Primary, High School & University students</p>

<button onclick="scrollToScholarships()">Start Now</button>

</div>

<!-- LOGIN / SIGNUP CENTER -->
<div class="auth">

<h3>Login / Sign Up</h3>

<input id="email" placeholder="Email"><br>

<input id="password" type="password" placeholder="Password"><br>

<button id="signupBtn">Sign Up</button>

<button id="loginBtn">Login</button>

</div>

<div id="user-section">

<h2 id="welcome"></h2>

<h3>Add Scholarship</h3>

<input id="title" placeholder="Scholarship title"><br>

<input id="description" placeholder="Description"><br>

<input id="country" placeholder="Country"><br>

<input id="field" placeholder="Field"><br>

<input id="degree" placeholder="Degree"><br>

<input id="link" placeholder="Application link"><br>

<button id="addScholarshipBtn">Add Scholarship</button>

<h3>Available Scholarships</h3>

<div id="scholarship-list" class="scholarship-list"></div>

<br>

<button id="logoutBtn">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* PUT YOUR FIREBASE KEYS HERE */

const firebaseConfig = {

apiKey:"PASTE_API_KEY",

authDomain:"PASTE_AUTH_DOMAIN",

projectId:"PASTE_PROJECT_ID",

storageBucket:"PASTE_BUCKET",

messagingSenderId:"PASTE_ID",

appId:"PASTE_APP_ID"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* START NOW SCROLL */

window.scrollToScholarships=function(){

document.getElementById("scholarship-list")
.scrollIntoView({behavior:"smooth"});

}

const email=document.getElementById("email");
const password=document.getElementById("password");

/* SIGNUP */

document.getElementById("signupBtn").onclick=async()=>{

try{

await createUserWithEmailAndPassword(auth,email.value,password.value);

alert("Account created");

}catch(error){

alert(error.message);

}

}

/* LOGIN */

document.getElementById("loginBtn").onclick=async()=>{

try{

await signInWithEmailAndPassword(auth,email.value,password.value);

}catch(error){

alert(error.message);

}

}

/* LOGOUT */

document.getElementById("logoutBtn").onclick=()=>{

signOut(auth);

}

/* AUTH STATE */

onAuthStateChanged(auth,user=>{

if(user){

document.getElementById("user-section").style.display="block";

document.getElementById("welcome").innerText="Welcome "+user.email;

loadScholarships();

}else{

document.getElementById("user-section").style.display="none";

}

});

/* ADD SCHOLARSHIP */

document.getElementById("addScholarshipBtn").onclick=async()=>{

const title=document.getElementById("title").value;
const description=document.getElementById("description").value;
const country=document.getElementById("country").value;
const field=document.getElementById("field").value;
const degree=document.getElementById("degree").value;
const link=document.getElementById("link").value;

try{

await addDoc(collection(db,"scholarships"),{

title,description,country,field,degree,link

});

alert("Scholarship added");

loadScholarships();

}catch(error){

alert(error.message);

}

}

/* LOAD SCHOLARSHIPS */

async function loadScholarships(){

const list=document.getElementById("scholarship-list");

list.innerHTML="";

const querySnapshot=await getDocs(collection(db,"scholarships"));

querySnapshot.forEach(doc=>{

const s=doc.data();

const div=document.createElement("div");

div.className="scholarship";

div.innerHTML=`

<h4>${s.title}</h4>

<p>${s.description}</p>

<p><b>Country:</b> ${s.country}</p>

<p><b>Field:</b> ${s.field}</p>

<p><b>Degree:</b> ${s.degree}</p>

<a href="${s.link}" target="_blank">Apply</a>

`;

list.appendChild(div);

});

}

</script>

</body>
</html>
