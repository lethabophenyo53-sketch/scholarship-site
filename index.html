<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholar Match</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f5f7fb;}
.container{max-width:1100px;margin:auto;padding:20px;}
.hero{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;padding:50px 20px;border-radius:15px;text-align:center;}
.hero h1{margin:0;font-size:40px;}
.hero p{margin-top:10px;font-size:18px;opacity:0.9;}
input,select{padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ddd;width:100%;max-width:300px;}
button{padding:10px 20px;border:none;border-radius:8px;background:#4f46e5;color:white;cursor:pointer;}
.card{background:white;padding:15px;margin:10px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;}
.locked{opacity:0.6;}
.premium-box{border:2px dashed #4f46e5;}
</style>
</head>

<body>
<div class="container">

<div class="hero">
<h1>🎓 Scholar Match</h1>
<p><strong>Find Scholarships. Unlock Your Future.</strong></p>
</div>

<div id="auth-section">
<h3>Login / Sign Up</h3>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="user-section" style="display:none;">
<h2 id="welcome"></h2>

<div class="card premium-box">
<h3>💎 Premium Access (R50)</h3>
<p id="premiumStatus"></p>
<p>
✔ Access high-value scholarships<br>
✔ Never miss deadlines<br>
✔ Get application guidance<br>
✔ Increase your chances of funding
</p>
<button onclick="fakeUpgrade()">Upgrade (Test Mode)</button>
</div>

<div id="admin-section" class="card" style="display:none;">
<h3>👑 Admin - Add Scholarship</h3>
<input id="title" placeholder="Title"><br>
<input id="description" placeholder="Description"><br>
<input id="link" placeholder="Application Link"><br>
<select id="levelScholarship">
<option>High School</option>
<option>College</option>
<option>University</option>
</select>
<select id="typeScholarship">
<option value="free">Free</option>
<option value="premium">Premium</option>
</select>
<button onclick="addScholarship()">Add Scholarship</button>
</div>

<h3>Scholarships</h3>
<input id="search" placeholder="Search..." oninput="loadScholarships()">
<div id="list" class="grid"></div>
<button onclick="logout()">Logout</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
authDomain: "scholarship-platform-ec01f.firebaseapp.com",
projectId: "scholarship-platform-ec01f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const authSection = document.getElementById("auth-section");
const userSection = document.getElementById("user-section");
const welcome = document.getElementById("welcome");
const list = document.getElementById("list");
const premiumStatus = document.getElementById("premiumStatus");
const adminSection = document.getElementById("admin-section");

const adminEmail = "lethabophenyo53@gmail.com";

window.signup = async () => {
const userCred = await createUserWithEmailAndPassword(auth,email.value,password.value);
await setDoc(doc(db,"profiles",userCred.user.uid),{
email:userCred.user.email,
premium:false
});
};

window.login = async () => {
await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth, async (user)=>{
if(user){
authSection.style.display="none";
userSection.style.display="block";
welcome.innerText="Welcome " + user.email;
if(user.email === adminEmail){adminSection.style.display="block";}

const snap = await getDoc(doc(db,"profiles",user.uid));
window.isPremiumUser = snap.exists() ? snap.data().premium : false;
premiumStatus.innerText = window.isPremiumUser ? "💎 Premium User" : "Free User";

loadScholarships();
}else{
authSection.style.display="block";
userSection.style.display="none";
adminSection.style.display="none";
}
});

window.fakeUpgrade = async () => {
const user = auth.currentUser;
await updateDoc(doc(db,"profiles",user.uid),{premium:true});
alert("You are now Premium 🎉");
location.reload();
};

window.addScholarship = async () => {
await addDoc(collection(db,"scholarships"),{
title:title.value,
description:description.value,
link:link.value,
level:levelScholarship.value,
type:typeScholarship.value
});
alert("Scholarship Added 🎉");
loadScholarships();
};

window.loadScholarships = async () => {
list.innerHTML="Loading...";
const snapshot = await getDocs(collection(db,"scholarships"));
list.innerHTML="";

const searchValue = document.getElementById("search").value.toLowerCase();

snapshot.forEach(docSnap=>{
const s = docSnap.data();
const matchesSearch = s.title.toLowerCase().includes(searchValue);
if(!matchesSearch) return;

const locked = (s.type === "premium" && !window.isPremiumUser);

list.innerHTML += `
<div class="card ${locked ? "locked": ""}">
<h4>${s.title}</h4>
<p>${s.description}</p>
<p><strong>Level:</strong> ${s.level}</p>
${locked 
? "<p>🔒 Premium Only – High chance funding</p>" 
: `<a href="${s.link}" target="_blank">Apply Now</a>`}
</div>`;
});
};

</script>
</body>
</html>
