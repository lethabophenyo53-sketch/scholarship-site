<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scholar Match PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#eef2ff}
.app{max-width:480px;margin:auto;background:#fff;min-height:100vh}
.header{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;padding:18px;text-align:center;font-weight:700}
.content{padding:15px;padding-bottom:100px}
.section{display:none}.active{display:block}
.card{background:#fff;padding:14px;margin:10px 0;border-radius:12px;box-shadow:0 6px 15px rgba(0,0,0,0.08)}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ddd}
button{width:100%;padding:12px;border:none;border-radius:8px;background:#4f46e5;color:white;font-weight:600;margin-top:6px;cursor:pointer}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:480px;display:flex;background:#fff}
.nav button{flex:1;background:none;color:#4f46e5}
.locked{opacity:0.5}
.highlight{border:2px solid #4f46e5;background:#fafaff}
</style>
</head>

<body>
<div class="app">
<div class="header">🚀 Scholar Match PRO</div>

<div class="content">

<!-- AUTH -->
<div id="auth" class="section active">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- HOME -->
<div id="home" class="section">
<h3 id="welcome"></h3>

<select id="profileLevel">
<option>Primary School</option>
<option>High School</option>
<option>College</option>
<option>University</option>
</select>
<button onclick="saveProfile()">Save Level</button>

<div class="card highlight">
<h3>💎 Premium Elite (R50)</h3>
<p>🚀 Get ahead of everyone:</p>
<ul style="padding-left:18px;">
<li>⚡ Early access</li>
<li>🎯 Smart recommendations</li>
<li>⏳ Deadline alerts</li>
<li>🔒 Hidden scholarships</li>
</ul>
<p id="status"></p>
<button onclick="upgrade()">Upgrade Now</button>
</div>

<button onclick="logout()">Logout</button>
</div>

<!-- FUNDING -->
<div id="funding" class="section">
<div class="card" style="background:#fee2e2;">
<p>⚠️ Scholarships closing soon — don’t miss out</p>
</div>
<h3>Scholarships</h3>
<div id="list"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
<h3>Admin Panel</h3>
<input id="title" placeholder="Title">
<input id="desc" placeholder="Description">
<input id="link" placeholder="Link">
<input id="deadline" type="date">
<select id="level">
<option>Primary School</option>
<option>High School</option>
<option>College</option>
<option>University</option>
<option>All</option>
</select>
<select id="type">
<option value="free">Free</option>
<option value="premium">Premium</option>
</select>
<button onclick="addScholarship()">Add</button>
<button onclick="autoGenerate()">Auto Generate</button>
<button onclick="clearAll()">Clear All</button>
</div>

</div>

<div class="nav">
<button onclick="go('home')">Home</button>
<button onclick="go('funding')">Funding</button>
<button onclick="go('admin')">Admin</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, getDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
authDomain:"scholarship-platform-ec01f.firebaseapp.com",
projectId:"scholarship-platform-ec01f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const adminEmail = "lethabophenyo53@gmail.com";
let profile = null;

window.go = (id)=>{
if(!auth.currentUser && id!=="auth") return go("auth");
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

window.signup = async ()=>{
const u = await createUserWithEmailAndPassword(auth,email.value,password.value);
await setDoc(doc(db,"profiles",u.user.uid),{level:"Primary School",premium:false,email:u.user.email});
}

window.login = ()=> signInWithEmailAndPassword(auth,email.value,password.value);
window.logout = ()=> signOut(auth);

onAuthStateChanged(auth, async (u)=>{
if(u){
const snap = await getDoc(doc(db,"profiles",u.uid));
profile = snap.data();
welcome.innerText = "Welcome " + u.email;
status.innerText = profile.premium ? "Premium User" : "Free User";
if(u.email!==adminEmail) document.querySelector("button[onclick=\"go('admin')\"]").style.display="none";
loadScholarships();
go('home');
}else{
profile=null;
welcome.innerText="";
list.innerHTML="";
go('auth');
}
});

window.saveProfile = async ()=>{
await updateDoc(doc(db,"profiles",auth.currentUser.uid),{level:profileLevel.value});
profile.level = profileLevel.value;
loadScholarships();
}

function countdown(d){
const diff=new Date(d)-new Date();
return diff<=0?"Closed":Math.floor(diff/86400000)+" days left";
}

window.loadScholarships = async ()=>{
list.innerHTML="";
const snap = await getDocs(collection(db,"scholarships"));
let arr=[];
snap.forEach(d=>arr.push(d.data()));
arr.sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));

arr.forEach(s=>{
if(s.level!==profile.level && s.level!=="All") return;
const locked = s.type==="premium" && !profile.premium;

list.innerHTML += `
<div class="card ${locked?"locked":""}">
<h4>${locked?"🔒 Premium Scholarship":s.title}</h4>
<p>${locked?"Upgrade to unlock full details":s.desc}</p>
<p>${countdown(s.deadline)}</p>
${locked?"<button onclick='go(\"home\")'>Unlock</button>":`<a href="${s.link}" target="_blank">Apply</a>`}
</div>`;
});
}

window.addScholarship = async ()=>{
if(auth.currentUser.email!==adminEmail) return alert("Not admin");
await addDoc(collection(db,"scholarships"),{
title:title.value,
desc:desc.value,
link:link.value,
deadline:deadline.value,
level:level.value,
type:type.value
});
alert("Added");
loadScholarships();
}

window.autoGenerate = async ()=>{
if(auth.currentUser.email!==adminEmail) return;
await clearAll();
const data=[
{title:"NSFAS 2027",desc:"Full funding",link:"https://nsfas.org.za",deadline:"2027-01-31",level:"University",type:"free"},
{title:"Elite Bursary",desc:"Top students",link:"#",deadline:"2027-02-01",level:"High School",type:"premium"}
];
for(const i of data) await addDoc(collection(db,"scholarships"),i);
loadScholarships();
}

window.clearAll = async ()=>{
const snap = await getDocs(collection(db,"scholarships"));
for(const d of snap.docs) await deleteDoc(doc(db,"scholarships",d.id));
loadScholarships();
}

window.upgrade = async ()=>{
await updateDoc(doc(db,"profiles",auth.currentUser.uid),{premium:true});
profile.premium=true;
status.innerText="Premium User";
loadScholarships();
alert("Upgraded (simulation)");
}

</script>
</body>
</html>
