<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scholar Match PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins}

body{
background:#0b1220;
color:#fff;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:520px;
min-height:100vh;
background:#111827;
padding-bottom:80px;
display:flex;
flex-direction:column;
}

.header{
padding:18px;
text-align:center;
font-weight:700;
background:linear-gradient(135deg,#6366f1,#a855f7);
}

.section{display:none;padding:15px}
.active{display:block}

.card{
background:#1f2937;
padding:14px;
margin:10px 0;
border-radius:14px;
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-top:6px;
background:#6366f1;
color:white;
font-weight:600;
cursor:pointer;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
justify-content:center;
}

.nav-inner{
width:100%;
max-width:520px;
display:flex;
background:#0f172a;
border-top:1px solid #333;
}

.nav-inner button{
flex:1;
background:none;
border:none;
color:white;
padding:12px;
}

.locked{opacity:0.4;filter:blur(1px)}
.small{font-size:12px;opacity:0.7}

#admin{display:none}

/* AI CHAT */
#aiBox{
position:fixed;
bottom:80px;
right:10px;
width:90%;
max-width:320px;
background:#0f172a;
border:1px solid #333;
border-radius:12px;
display:none;
flex-direction:column;
padding:10px;
}
#chatLog{height:200px;overflow:auto;font-size:12px;margin-bottom:8px}
.aiMsg{margin:5px 0}
</style>
</head>

<body>

<div class="app">

<div class="header">🎓 SCHOLAR MATCH PRO</div>

<!-- AUTH -->
<div id="auth" class="section active">
<h3>Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- HOME -->
<div id="home" class="section">
<h3 id="welcome"></h3>

<div class="card">
<h3>💎 Premium Access (R50)</h3>
<p>Unlock exclusive scholarships + AI features</p>
<button onclick="upgrade()">Upgrade</button>
</div>

<button onclick="toggleAI()">Ask AI Assistant</button>
<button onclick="logout()">Logout</button>
</div>

<!-- SCHOLARSHIPS -->
<div id="scholarships" class="section">
<h3>Scholarships</h3>
<div id="list"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
<h3>Admin Panel</h3>

<input id="title" placeholder="Title">
<input id="desc" placeholder="Description">
<input id="link" placeholder="Link">
<input id="deadline" type="date">

<select id="type">
<option value="free">Free</option>
<option value="premium">Premium</option>
</select>

<button onclick="addScholarship()">Add Scholarship</button>
<button onclick="autoRefresh()">Auto Refresh Feed</button>
</div>

</div>

<!-- NAV -->
<div class="nav">
<div class="nav-inner">
<button onclick="go('home')">Home</button>
<button onclick="go('scholarships')">List</button>
<button onclick="go('admin')">Admin</button>
</div>
</div>

<!-- AI BOX -->
<div id="aiBox">
<div id="chatLog"></div>
<input id="aiInput" placeholder="Ask something...">
<button onclick="sendAI()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
authDomain: "scholarship-platform-ec01f.firebaseapp.com",
projectId: "scholarship-platform-ec01f",
storageBucket: "scholarship-platform-ec01f.firebasestorage.app",
messagingSenderId: "807575045909",
appId: "1:807575045909:web:9a61a548638423d7988b1c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "lethabophenyo53@gmail.com";

let profile = {premium:false, usage:0};

const emailEl = document.getElementById("email");
const passEl = document.getElementById("password");
const listEl = document.getElementById("list");
const welcomeEl = document.getElementById("welcome");

window.go = (page)=>{
if(!auth.currentUser) page="auth";
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(page).classList.add("active");
};

window.signup = async ()=>{
await createUserWithEmailAndPassword(auth,emailEl.value,passEl.value);
const u = auth.currentUser;
await setDoc(doc(db,"users",u.uid),{email:u.email,premium:false,usage:0});
};

window.login = ()=>signInWithEmailAndPassword(auth,emailEl.value,passEl.value);
window.logout = ()=>signOut(auth);

onAuthStateChanged(auth, async(user)=>{
if(!user){go("auth");return;}

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

profile = snap.exists()?snap.data():{premium:false,usage:0};

await setDoc(ref,{email:user.email,premium:false,usage:0},{merge:true});

document.getElementById("admin").style.display = user.email===ADMIN_EMAIL?"block":"none";
welcomeEl.innerText="Welcome "+user.email;

loadScholarships();
go("home");
});

window.loadScholarships = async ()=>{
listEl.innerHTML="";
const snap = await getDocs(collection(db,"scholarships"));

snap.forEach(d=>{
const s=d.data();
const locked = s.type==="premium" && !profile.premium;

const days = s.deadline?Math.max(0,Math.ceil((new Date(s.deadline)-new Date())/86400000)):"-";

listEl.innerHTML+=`
<div class="card ${locked?'locked':''}">
<h4>${s.title}</h4>
<p>${locked?"🔒 Premium Only":s.desc}</p>
<p class="small">${days} days left</p>
${locked?`<button disabled>Locked</button>`:`<a href="${s.link}" target="_blank"><button>Apply</button></a>`}
</div>`;
});
};

window.addScholarship = async ()=>{
if(auth.currentUser.email!==ADMIN_EMAIL) return;
await addDoc(collection(db,"scholarships"),{
title:title.value,
desc:desc.value,
link:link.value,
deadline:deadline.value,
type:type.value
});
loadScholarships();
};

window.autoRefresh = async ()=>{
const snap = await getDocs(collection(db,"scholarships"));
snap.forEach(()=>{});
alert("Feed synced");
};

window.upgrade = ()=>{
const f=document.createElement("form");
f.method="POST";
f.action="https://www.payfast.co.za/eng/process";

const data={
merchant_id:"REPLACE_ME",
merchant_key:"REPLACE_ME",
amount:"50.00",
item_name:"Premium Access",
return_url:window.location.origin+"?paid=true",
cancel_url:window.location.origin
};

Object.keys(data).forEach(k=>{
const i=document.createElement("input");
i.type="hidden";i.name=k;i.value=data[k];
f.appendChild(i);
});

document.body.appendChild(f);
f.submit();
};

window.toggleAI = ()=>{
const box=document.getElementById("aiBox");
box.style.display=box.style.display==="flex"?"none":"flex";
};

window.sendAI = ()=>{
const input=document.getElementById("aiInput");
const log=document.getElementById("chatLog");

if(profile.usage>=3 && !profile.premium){
log.innerHTML+="<div class='aiMsg'>Upgrade required for more AI usage</div>";
return;
}

profile.usage++;

log.innerHTML+=`<div class='aiMsg'>You: ${input.value}</div>`;
log.innerHTML+=`<div class='aiMsg'>AI: Focus on scholarships, deadlines, and applications. Keep applying daily.</div>`;
input.value="";
};
</script>

</body>
</html>
