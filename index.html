<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholar Match</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ---------- General Styles ---------- */
body {
    font-family: 'Montserrat', sans-serif;
    margin: 0;
    padding: 0;
    background: url('https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
    background-size: cover;
    color: #333;
    scroll-behavior: smooth;
}

/* MAIN CONTAINER */
.container{
    max-width:1100px;
    margin:auto;
    background:rgba(255,255,255,0.95);
    padding:30px;
    margin-top:40px;
    border-radius:12px;
    box-shadow:0 10px 40px rgba(0,0,0,0.25);
}

/* HERO SECTION */
.hero{
    text-align:center;
    background:rgba(27,31,59,0.85);
    color:white;
    padding:60px;
    border-radius:10px;
    margin-bottom:40px;
}
.hero h1 { font-size:50px; }
.hero p { font-size:20px; }
.hero button{
    margin-top:20px;
    padding:14px 28px;
    font-size:18px;
    border-radius:50px;
    border:none;
    background: linear-gradient(135deg,#6C63FF,#4CAF50);
    color:white;
    cursor:pointer;
    font-weight:700;
    box-shadow:0px 6px 20px rgba(0,0,0,0.4);
    transition:0.3s;
}
.hero button:hover{ transform:scale(1.05); }

/* LOGIN / SIGNUP */
.auth{
    text-align:center;
    margin-bottom:40px;
}
.auth input{
    padding:12px;
    margin:8px;
    border-radius:8px;
    border:1px solid #ddd;
    width:250px;
}
.auth button{
    padding:12px 25px;
    margin:8px;
    border:none;
    border-radius:8px;
    background:#6C63FF;
    color:white;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}
.auth button:hover{ background:#574fd6; transform:scale(1.05); }

/* SCHOLARSHIP GRID */
.scholarship-list{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}
.scholarship{
    background:white;
    border:1px solid #ddd;
    padding:15px;
    margin:10px;
    border-radius:10px;
    width:280px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}
.scholarship:hover{
    transform: translateY(-7px);
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* USER AREA */
#user-section{ display:none; text-align:center; }
input, select{ margin:5px; padding:10px; border-radius:6px; border:1px solid #ccc; }
button{ font-size:15px; }

/* RESPONSIVE */
@media (max-width:768px){
    .scholarship{ width:90%; margin:10px auto; }
    input{ width:90%; }
}
</style>
</head>
<body>

<div class="container">
<div class="hero">
    <h1>Scholar Match</h1>
    <p>Find scholarships for Primary, High School, College & University students</p>
    <button onclick="document.getElementById('auth-section').scrollIntoView({behavior:'smooth'});">Get Started Now</button>
</div>

<!-- LOGIN / SIGNUP -->
<div class="auth" id="auth-section">
    <h3>Login / Sign Up</h3>
    <input type="email" id="email" placeholder="Email"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button id="signupBtn">Sign Up</button>
    <button id="loginBtn">Login</button>
</div>

<!-- USER SECTION -->
<div id="user-section">
    <h2 id="welcome"></h2>
    <h3>Your Profile</h3>
    <input type="text" id="country" placeholder="Country"><br>
    <select id="level">
        <option value="">Level of School</option>
        <option>Primary School</option>
        <option>High School</option>
        <option>College</option>
        <option>University</option>
    </select>
    <select id="qualification">
        <option value="">Qualification</option>
        <option>Certificate</option>
        <option>Diploma</option>
        <option>Degree</option>
    </select>
    <input type="number" id="age" placeholder="Age"><br>
    <input type="text" id="grade" placeholder="Grade (e.g., Grade 6, Grade 12, N/A)"><br>
    <button onclick="saveProfile()">Save Profile</button>
    
    <h3>Available Scholarships</h3>
    <div id="scholarship-list" class="scholarship-list"></div>

    <!-- ADMIN ADD SCHOLARSHIP -->
    <div id="admin-section" style="display:none;">
        <h3>Add Scholarship (Admin)</h3>
        <input type="text" id="title" placeholder="Scholarship Title"><br>
        <input type="text" id="description" placeholder="Description"><br>
        <input type="text" id="countryScholarship" placeholder="Country"><br>
        <select id="levelScholarship">
            <option value="">Level of School</option>
            <option>Primary School</option>
            <option>High School</option>
            <option>College</option>
            <option>University</option>
        </select>
        <select id="qualificationScholarship">
            <option value="">Qualification</option>
            <option>Certificate</option>
            <option>Diploma</option>
            <option>Degree</option>
        </select>
        <input type="number" id="minAge" placeholder="Minimum Age"><br>
        <input type="number" id="maxAge" placeholder="Maximum Age"><br>
        <input type="text" id="gradeScholarship" placeholder="Grade (e.g., Grade 12, N/A)"><br>
        <input type="text" id="link" placeholder="Application Link"><br>
        <button id="addScholarshipBtn">Add Scholarship</button>
    </div>

    <br>
    <button id="logoutBtn">Logout</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ---------- FIREBASE CONFIG ----------
const firebaseConfig = {
  apiKey: "AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
  authDomain: "scholarship-platform-ec01f.firebaseapp.com",
  projectId: "scholarship-platform-ec01f",
  storageBucket: "scholarship-platform-ec01f.firebasestorage.app",
  messagingSenderId: "807575045909",
  appId: "1:807575045909:web:9a61a548638423d7988b1c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const adminEmail = "lethabophenyo53@gmail.com";

const email = document.getElementById("email");
const password = document.getElementById("password");

// ---------- PRELOADED SCHOLARSHIPS ----------
const initialScholarships = [
  { title: "Cape Town Primary School Excellence Award", description: "Award for outstanding academic performance in Grade 6.", country: "South Africa", level:"Primary School", qualification:"N/A", minAge:10, maxAge:12, grade:"Grade 6", link:"https://www.example.com/cape-town-primary"},
  { title: "SA High School Leadership Scholarship", description: "For high school students showing exceptional leadership qualities.", country:"South Africa", level:"High School", qualification:"N/A", minAge:13, maxAge:18, grade:"Grade 8-12", link:"https://www.example.com/sa-highschool"},
  { title: "University of Johannesburg Undergraduate Merit Scholarship", description:"For top-performing students enrolling in a Bachelor's degree program.", country:"South Africa", level:"University", qualification:"Degree", minAge:18, maxAge:25, grade:"N/A", link:"https://www.uj.ac.za/scholarships"},
  { title: "Durban College Diploma Scholarship", description:"For students pursuing a Diploma at Durban College.", country:"South Africa", level:"College", qualification:"Diploma", minAge:18, maxAge:25, grade:"N/A", link:"https://www.durbancollege.ac.za/scholarships"},
  { title: "SA Certificate Skills Award", description:"Award for students completing certificate courses.", country:"South Africa", level:"College", qualification:"Certificate", minAge:16, maxAge:30, grade:"N/A", link:"https://www.sacertificates.co.za/scholarships"}
];

async function preloadScholarships() {
  const querySnapshot = await getDocs(collection(db, "scholarships"));
  if(querySnapshot.empty){
    for(let s of initialScholarships){
      await addDoc(collection(db,"scholarships"), s);
    }
    console.log("Preloaded scholarships added!");
  }
}

// ---------- AUTH ----------
document.getElementById("signupBtn").onclick = async()=>{
  if(!email.value || !password.value){ alert("Enter email & password"); return; }
  try{ await createUserWithEmailAndPassword(auth,email.value,password.value); alert("Account created!"); }
  catch(error){ alert(error.message); }
}

document.getElementById("loginBtn").onclick = async()=>{
  try{ await signInWithEmailAndPassword(auth,email.value,password.value); }
  catch(error){ alert(error.message); }
}

document.getElementById("logoutBtn").onclick = ()=>{ signOut(auth); }

// ---------- AUTH STATE ----------
onAuthStateChanged(auth,user=>{
  if(user){
    document.getElementById("user-section").style.display="block";
    document.getElementById("welcome").innerText="Welcome "+user.email;
    if(user.email === adminEmail){ document.getElementById("admin-section").style.display="block"; }
    preloadScholarships().then(loadScholarships);
  }else{
    document.getElementById("user-section").style.display="none";
  }
});

// ---------- SAVE PROFILE ----------
async function saveProfile(){
  const user = auth.currentUser;
  if(!user){ alert("Login first"); return; }
  const profile = {
    country: document.getElementById("country").value,
    level: document.getElementById("level").value,
    qualification: document.getElementById("qualification").value,
    age: document.getElementById("age").value,
    grade: document.getElementById("grade").value
  };
  await setDoc(doc(db,"profiles",user.uid),profile);
  alert("Profile saved!");
}

// ---------- ADD SCHOLARSHIP ----------
document.getElementById("addScholarshipBtn").onclick = async()=>{
  const title = document.getElementById("title").value;
  const description = document.getElementById("description").value;
  const country = document.getElementById("countryScholarship").value;
  const level = document.getElementById("levelScholarship").value;
  const qualification = document.getElementById("qualificationScholarship").value;
  const minAge = document.getElementById("minAge").value;
  const maxAge = document.getElementById("maxAge").value;
  const grade = document.getElementById("gradeScholarship").value;
  const link = document.getElementById("link").value;
  if(!title || !description){ alert("Fill required fields"); return; }
  await addDoc(collection(db,"scholarships"),{title,description,country,level,qualification,minAge,maxAge,grade,link});
  alert("Scholarship added!");
  loadScholarships();
}

// ---------- LOAD SCHOLARSHIPS ----------
async function loadScholarships(){
  const list = document.getElementById("scholarship-list");
  list.innerHTML = "";
  const querySnapshot = await getDocs(collection(db,"scholarships"));
  querySnapshot.forEach(doc=>{
    const s = doc.data();
    const div = document.createElement("div");
    div.className="scholarship";
    div.innerHTML = `
      <h4>${s.title}</h4>
      <p>${s.description}</p>
      <p><b>Country:</b> ${s.country}</p>
      <p><b>Level:</b> ${s.level}</p>
      <p><b>Qualification:</b> ${s.qualification}</p>
      <p><b>Grade:</b> ${s.grade}</p>
      <a href="${s.link}" target="_blank">Apply</a>
    `;
    list.appendChild(div);
  });
}
</script>

</body>
</html>
