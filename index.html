<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scholar Match Pro+ SaaS Web</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
}

.app{
max-width:460px;
margin:auto;
min-height:100vh;
background:#fff;
box-shadow:0 10px 40px rgba(0,0,0,0.12);
position:relative;
overflow:hidden;
}

.header{
background:linear-gradient(135deg,#4f46e5,#7c3aed);
color:white;
padding:20px;
text-align:center;
font-weight:700;
font-size:18px;
}

.content{padding:14px;padding-bottom:100px;}
.section{display:none;}
.active{display:block;}

.card{
background:#fff;
padding:14px;
margin:10px 0;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

input,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
font-weight:600;
cursor:pointer;
margin-top:6px;
}
button:hover{opacity:0.9;}

.nav{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:460px;
max-width:100%;
display:flex;
background:white;
box-shadow:0 -5px 20px rgba(0,0,0,0.1);
}

.nav button{
flex:1;
background:none;
color:#4f46e5;
font-size:11px;
padding:10px;
}

.badge{background:#4f46e5;color:white;padding:4px 8px;border-radius:20px;font-size:11px;}
.locked{opacity:0.5;}
.small{font-size:12px;color:#ef4444;}

.admin-only{display:none;}
</style>
</head>

<body>

<div class="app">
<div class="header">🎓 Scholar Match Pro+ SaaS Website</div>

<div class="content">

<!-- AUTH -->
<div id="auth" class="section active">
<h3>Login / Signup</h3>
<input id="email" placeholder="Email" />
<input id="password" type="password" placeholder="Password" />
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- HOME -->
<div id="home" class="section">
<h3 id="welcome"></h3>

<div class="card">
<h4>🎯 Your Level</h4>
<select id="profileLevel">
<option>Primary School</option>
<option>High School</option>
<option>College</option>
<option>University</option>
</select>
<button onclick="saveProfile()">Save</button>
</div>

<div class="card">
<h4>📊 Stats</h4>
<p>Scholarships Viewed: <span id="views">0</span></p>
</div>

<div class="card">
<h4>💎 Premium</h4>
<p id="status">Free User</p>
<button onclick="pay()">Upgrade R50</button>
</div>
</div>

<!-- FUNDING -->
<div id="funding" class="section">
<h3>Scholarships</h3>
<div id="list"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<h3>📊 Dashboard</h3>
<div class="card">
<p>Total Scholarships: <span id="totalScholarships">0</span></p>
<p>Profile Level: <span id="userLevel"></span></p>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="section admin-only">
<h3>Admin Panel</h3>

<input id="title" placeholder="Title" />
<input id="desc" placeholder="Description" />
<input id="link" placeholder="Link" />
<input id="deadline" type="date" />

<select id="scholarLevel">
<option>Primary School</option>
<option>High School</option>
<option>College</option>
<option>University</option>
<option>All</option>
</select>

<select id="scholarType">
<option value="free">Free</option>
<option value="premium">Premium</option>
</select>

<button onclick="addScholarship()">Add Scholarship</button>

<hr>
<h4>⚙️ Auto System</h4>
<button onclick="refreshScholarships()">🔄 Auto Refresh (2027)</button>
<button onclick="clearScholarships()">🧹 Clear All</button>
</div>

</div>

<div class="nav">
<button onclick="go('home')">Home</button>
<button onclick="go('funding')">Funding</button>
<button onclick="go('dashboard')">Dashboard</button>
<button onclick="go('admin')">Admin</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, doc, getDoc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let profile;
let viewCount = 0;

// ADMIN SECURITY
const adminEmails = ["admin@gmail.com"];
let isAdmin = false;

window.go=(id)=>{
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
};

window.signup=async()=>{
const u=await createUserWithEmailAndPassword(auth,email.value,password.value);
await setDoc(doc(db,"profiles",u.user.uid),{
premium:false,
level:"Primary School",
views:0
});
};

window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);

onAuthStateChanged(auth,async(u)=>{
if(u){

isAdmin = adminEmails.includes(u.email);
if(isAdmin){document.querySelector('.admin-only').style.display='block';}

const snap=await getDoc(doc(db,"profiles",u.uid));
profile=snap.data();

welcome.innerText="Welcome " + u.email;
status.innerText=profile.premium?"Premium 💎":"Free";
userLevel.innerText=profile.level;

loadScholarships();
go('home');
}else go('auth');
});

window.saveProfile=async()=>{
await updateDoc(doc(db,"profiles",auth.currentUser.uid),{
level:profileLevel.value
});
profile.level=profileLevel.value;
loadScholarships();
};

function countDown(d){
const diff=new Date(d)-new Date();
if(diff<=0) return "Closed";
return Math.floor(diff/86400000)+" days left";
}

window.loadScholarships=async()=>{
list.innerHTML="";
let snap=await getDocs(collection(db,"scholarships"));

let count=0;

snap.forEach(s=>{
const d=s.data();
count++;

if(profile.level && d.level!==profile.level && d.level!=="All") return;

const locked=d.type==="premium" && !profile.premium;

list.innerHTML+=`
<div class='card ${locked?"locked":""}' onclick="trackView()">
<span class='badge'>${d.level}</span>
<h4>${d.title}</h4>
<p>${d.desc}</p>
<p class='small'>⏳ ${countDown(d.deadline)}</p>
${locked?"🔒 Premium Only":"<a href='"+d.link+"' target='_blank'>Apply</a>"}
</div>`;
});

totalScholarships.innerText=count;
userLevel.innerText=profile.level;
};

window.trackView=()=>{
viewCount++;
views.innerText=viewCount;
};

window.addScholarship=async()=>{
if(!isAdmin) return alert("Not admin");
await addDoc(collection(db,"scholarships"),{
title:title.value,
desc:desc.value,
link:link.value,
deadline:deadline.value,
type:scholarType.value,
level:scholarLevel.value
});
loadScholarships();
};

window.clearScholarships=async()=>{
if(!isAdmin) return;
let snap=await getDocs(collection(db,"scholarships"));
snap.forEach(async(d)=>{
await deleteDoc(doc(db,"scholarships",d.id));
});
alert("Cleared");
};

window.refreshScholarships=async()=>{
if(!isAdmin) return;
await clearScholarships();

const data=[
{title:"NSFAS 2027",desc:"Funding for university students",link:"https://nsfas.org.za",deadline:"2027-01-31",type:"free",level:"University"},
{title:"Primary School Grant",desc:"Support for learners",link:"https://gov.za",deadline:"2027-03-10",type:"free",level:"Primary School"},
{title:"Google Scholarship",desc:"Tech training",link:"https://google.com",deadline:"2027-07-01",type:"free",level:"College"}
];

for(let i of data){
await addDoc(collection(db,"scholarships"),i);
}

loadScholarships();
alert("Auto refreshed");
};

window.pay=()=>window.open("https://payfast.co.za","_blank");
window.ai=()=>{aiOut.innerText="Keep going: " + aiInput.value;};
</script>

</body>

</html>
</html>
