<!DOCTYPE html>
<html>
<head>
  <title>Scholar match</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>
  <style>
  body {
    font-family: Arial;
    text-align: center;
    background-color: #f4f6f9;
  }

  input {
    padding: 8px;
    width: 200px;
  }

  button {
    padding: 8px 15px;
    margin: 5px;
    background-color: #4CAF50;
    color: white;
    border: none;
    cursor: pointer;
  }

  .scholarship {
    background: white;
    margin: 15px auto;
    padding: 15px;
    width: 300px;
    border-radius: 8px;
    box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
  }
</style>
</head>
<body>

  <h1>Scholar Match</h1>

  <div id="auth-section">
    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="password" id="password" placeholder="Password"><br><br>
    <button onclick="signUp()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>

  <div id="user-section" style="display:none;">
  <h2 id="welcome"></h2>

  <h3>Available Scholarships</h3>
<div id="scholarship-list"></div>

  <div class="scholarship">
    <h4>NSFAS Funding</h4>
    <p>For South African students in public universities.</p>
  </div>

  <div class="scholarship">
    <h4>Funza Lushaka Bursary</h4>
    <p>For students studying teaching qualifications.</p>
  </div>

  <div class="scholarship">
    <h4>Sasol Bursary</h4>
    <p>For students in engineering and science fields.</p>
  </div>

  <br>
  <button onclick="logout()">Logout</button>
</div>
  
    <script>
      async function loadScholarships() {
  const querySnapshot = await getDocs(collection(db, "scholarships"));
  const list = document.getElementById("scholarship-list");
  list.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    list.innerHTML += `
      <div class="scholarship">
        <h4>${data.title}</h4>
        <p>${data.description}</p>
      </div>
    `;
  });
}
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
  const firebaseConfig = {
    apiKey: "AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
    authDomain: "scholarship-platform-ec01f.firebaseapp.com",
    projectId: "scholarship-platform-ec01f",
    storageBucket: "scholarship-platform-ec01f.firebasestorage.app",
    messagingSenderId: "807575045909",
    appId: "1:807575045909:web:9a61a548638423d7988b1c"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();

  function signUp() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
      .then(() => alert("User Created!"))
      .catch(error => alert(error.message));
  }

  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => alert("Logged in!"))
      .catch(error => alert(error.message));
  }

  function logout() {
    auth.signOut();
  }

  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("auth-section").style.display = "none";
      document.getElementById("user-section").style.display = "block";
      document.getElementById("welcome").innerText = "Welcome " + user.email;
    } else {
      loadScholarships();//
      document.getElementById("auth-section").style.display = "block";
      document.getElementById("user-section").style.display = "none";
    }
  });

</script>
</body>
</html>
