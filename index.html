<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholar Match</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f5f7fb;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.hero{
background:linear-gradient(135deg,#4f46e5,#7c3aed);
color:white;
padding:40px;
border-radius:15px;
text-align:center;
}

input,select{
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ddd;
width:100%;
max-width:300px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#4f46e5;
color:white;
cursor:pointer;
}

.card{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.locked{
opacity:0.5;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>🎓 Scholar Match</h1>
<p>Find Scholarships Easily</p>
</div>

<!-- AUTH -->
<div id="auth-section">
<h3>Login / Sign Up</h3>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- USER -->
<div id="user-section" style="display:none;">

<h2 id="welcome"></h2>

<!-- PREMIUM -->
<div class="card">
<h3>💎 Premium</h3>
<p id="premiumStatus">Checking...</p>

<form action="https://sandbox.payfast.co.za/eng/process" method="post">

<input type="hidden" name="merchant_id" value="10000100">
<input type="hidden" name="merchant_key" value="46f0cd694581a">

<input type="hidden" name="amount" value="50.00">
<input type="hidden" name="item_name" value="Scholar Match Premium">

<input type="hidden" name="return_url" value="http://localhost:5500/success.html">
<input type="hidden" name="cancel_url" value="http://localhost:5500/cancel.html">

<!-- 🔴 IMPORTANT: PUT YOUR FUNCTION URL HERE -->
<input type="hidden" name="notify_url" value="PASTE_FUNCTION_URL_HERE">

<input type="hidden" name="email_address" id="payfast-email">

<button type="submit">Upgrade to Premium 💳</button>

</form>

</div>

<h3>Scholarships</h3>

<input id="search" placeholder="Search..." oninput="loadScholarships()">

<select id="filterLevel" onchange="loadScholarships()">
<option value="">All Levels</option>
<option>Primary School</option>
<option>High School</option>
<option>College</option>
<option>University</option>
</select>

<div id="list" class="grid"></div>

<button onclick="logout()">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
authDomain: "scholarship-platform-ec01f.firebaseapp.com",
projectId: "scholarship-platform-ec01f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* AUTH */
window.signup = async () => {
await createUserWithEmailAndPassword(auth,email.value,password.value);
};

window.login = async () => {
await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = () => signOut(auth);

/* AUTH STATE */
onAuthStateChanged(auth, async (user)=>{

if(user){

authSection.style.display="none";
userSection.style.display="block";

welcome.innerText="Welcome " + user.email;

/* SET EMAIL FOR PAYFAST */
document.getElementById("payfast-email").value = user.email;

/* CHECK PREMIUM */
const snap = await getDoc(doc(db,"profiles",user.uid));

window.isPremiumUser = snap.exists() ? snap.data().premium : false;

premiumStatus.innerText = window.isPremiumUser ? "💎 Premium User" : "Free User";

loadScholarships();

}else{
authSection.style.display="block";
userSection.style.display="none";
}

});

/* LOAD SCHOLARSHIPS */
async function loadScholarships(){

const snapshot = await getDocs(collection(db,"scholarships"));

list.innerHTML="";

const searchValue = document.getElementById("search").value.toLowerCase();
const filterLevel = document.getElementById("filterLevel").value;

snapshot.forEach(doc=>{
const s = doc.data();

const matchesSearch = s.title.toLowerCase().includes(searchValue);
const matchesLevel = filterLevel ? s.level === filterLevel : true;

if(!matchesSearch || !matchesLevel) return;

const locked = (s.type === "premium" && !window.isPremiumUser);

list.innerHTML += `
<div class="card ${locked ? "locked":""}">
<img src="${s.image || "https://images.unsplash.com/photo-1523050854058-8df90110c9f1"}" style="width:100%;border-radius:8px;">
<h4>${s.title}</h4>
<p>${s.description}</p>

${locked 
? "<p>🔒 Premium Only</p>" 
: `<a href="${s.link}" target="_blank">Apply</a>`}

</div>
`;
});

}

</script>

</body>
</html>
