<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholar Match</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Montserrat',sans-serif;
margin:0;
background:#f4f6f9;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.hero{
text-align:center;
background:linear-gradient(135deg,#1b1f3b,#6C63FF);
color:white;
padding:50px;
border-radius:12px;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
background:#6C63FF;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
opacity:0.8;
}

input,select{
padding:10px;
margin:6px;
border-radius:6px;
border:1px solid #ccc;
width:250px;
}

.card{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

#user-section, #admin-section{
display:none;
}

#premium-box{
border:2px dashed green;
padding:15px;
margin-top:20px;
border-radius:8px;
}

.locked{
opacity:0.5;
}

.loading{
text-align:center;
margin:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>🎓 Scholar Match</h1>
<p>Find Scholarships Easily</p>
</div>

<!-- AUTH -->
<div id="auth-section">
<h3>Login / Sign Up</h3>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button id="signupBtn">Sign Up</button>
<button id="loginBtn">Login</button>
</div>

<!-- USER -->
<div id="user-section">

<h2 id="welcome"></h2>

<div class="card">
<h3>Your Profile</h3>
<input id="country" placeholder="Country"><br>

<select id="level">
<option value="">Select Level</option>
<option>Primary School</option>
<option>High School</option>
<option>College</option>
<option>University</option>
</select><br>

<button onclick="saveProfile()">Save Profile</button>
</div>

<!-- PREMIUM -->
<div id="premium-box">
<h3>Premium Access</h3>
<p id="premium-status">Free User</p>
<button onclick="activatePremium()">Activate Premium (Test)</button>
</div>

<h3>Scholarships</h3>
<div id="scholarship-list"></div>

<!-- ADMIN -->
<div id="admin-section" class="card">
<h3>Add Scholarship (Admin)</h3>
<input id="title" placeholder="Title"><br>
<input id="description" placeholder="Description"><br>
<input id="link" placeholder="Application Link"><br>

<select id="levelScholarship">
<option>Primary School</option>
<option>High School</option>
<option>College</option>
<option>University</option>
</select><br>

<button id="addScholarshipBtn">Add Scholarship</button>
</div>

<br>
<button id="logoutBtn">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, setDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const adminEmail = "lethabophenyo53@gmail.com";

/* ELEMENTS */
const email = document.getElementById("email");
const password = document.getElementById("password");

const authSection = document.getElementById("auth-section");
const userSection = document.getElementById("user-section");
const adminSection = document.getElementById("admin-section");
const welcome = document.getElementById("welcome");
const scholarshipList = document.getElementById("scholarship-list");
const premiumStatus = document.getElementById("premium-status");

/* AUTH */
signupBtn.onclick = async () => {
if(!email.value || !password.value){
alert("Fill in all fields");
return;
}

try{
await createUserWithEmailAndPassword(auth,email.value,password.value);
}catch(e){
alert(e.message);
}
};

loginBtn.onclick = async () => {
if(!email.value || !password.value){
alert("Fill in all fields");
return;
}

try{
await signInWithEmailAndPassword(auth,email.value,password.value);
}catch(e){
alert(e.message);
}
};

logoutBtn.onclick = () => signOut(auth);

/* AUTH STATE */
onAuthStateChanged(auth, async (user) => {

if(user){
authSection.style.display="none";
userSection.style.display="block";
welcome.innerText="Welcome " + user.email;

adminSection.style.display = user.email === adminEmail ? "block" : "none";

/* LOAD PROFILE */
const profileRef = doc(db,"profiles",user.uid);
const snap = await getDoc(profileRef);

window.isPremiumUser = snap.exists() ? snap.data().premium : false;

premiumStatus.innerText = window.isPremiumUser ? "💎 Premium User" : "Free User";

loadScholarships();

}else{
authSection.style.display="block";
userSection.style.display="none";
adminSection.style.display="none";
}

});

/* SAVE PROFILE */
window.saveProfile = async () => {
const user = auth.currentUser;

const ref = doc(db,"profiles",user.uid);
const existing = await getDoc(ref);

let premium = existing.exists() ? existing.data().premium : false;

await setDoc(ref,{
country:country.value,
level:level.value,
premium:premium
});

alert("Profile saved ✅");
};

/* PREMIUM */
window.activatePremium = async () => {
const user = auth.currentUser;

await setDoc(doc(db,"profiles",user.uid),{
premium:true
},{merge:true});

window.isPremiumUser = true;
premiumStatus.innerText = "💎 Premium User";

loadScholarships();
};

/* ADD SCHOLARSHIP */
addScholarshipBtn.onclick = async () => {

if(!title.value || !description.value || !link.value){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"scholarships"),{
title:title.value,
description:description.value,
link:link.value,
level:levelScholarship.value
});

alert("Added ✅");
loadScholarships();
};

/* LOAD SCHOLARSHIPS */
async function loadScholarships(){

scholarshipList.innerHTML = "<div class='loading'>Loading...</div>";

const snapshot = await getDocs(collection(db,"scholarships"));

scholarshipList.innerHTML = "";

snapshot.forEach(docSnap=>{
const s = docSnap.data();

const locked = (s.level==="University" && !window.isPremiumUser);

const div=document.createElement("div");
div.className="card " + (locked ? "locked" : "");

div.innerHTML=`
<h4>${s.title}</h4>
<p>${s.description}</p>
${locked 
? "<p>🔒 Premium Only</p>" 
: `<a href="${s.link}" target="_blank">Apply</a>`
}
`;

scholarshipList.appendChild(div);
});

}

</script>

</body>
</html>
