<!DOCTYPE html>
<html>
<head>
<title>Scholar Match</title>

<style>

<style>

body{
font-family: Arial, sans-serif;
background:#eef2f7;
margin:0;
padding:0;
text-align:center;
}

h1{
color:#2c3e50;
margin-top:20px;
}

/* GRID FOR SCHOLARSHIPS */

#scholarship-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
max-width:1000px;
margin:auto;
}

/* SCHOLARSHIP CARD */

.scholarship{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
text-align:left;
}

.scholarship:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* IMAGE */

.scholarship img{
width:100%;
height:160px;
object-fit:cover;
}

/* CARD CONTENT */

.card-content{
padding:15px;
}

.card-content h4{
margin:0;
color:#2c3e50;
}

.card-content p{
font-size:14px;
color:#555;
}

.deadline{
color:#e74c3c;
font-weight:bold;
}

/* BUTTONS */

button{
padding:8px 12px;
margin-top:6px;
margin-right:5px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

input{
padding:8px;
width:220px;
border-radius:5px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<h1>Scholar Match</h1>

<div id="auth-section">

<input type="email" id="email" placeholder="Email"><br><br>

<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="signUp()">Sign Up</button>

<button onclick="login()">Login</button>

</div>

<div id="user-section" style="display:none;">

<h2 id="welcome"></h2>

<h3>Your Profile</h3>

<input type="text" id="country" placeholder="Country"><br><br>
<input type="text" id="field" placeholder="Field of Study"><br><br>
<input type="text" id="qualification" placeholder="qualification level"><br><br>

<button onclick="saveProfile()">Save Profile</button>

<br><br>

<h3>Available Scholarships</h3>

<h4>Filter Scholarships</h4>

<input type="text" id="filterCountry" placeholder="Filter by Country">
<input type="text" id="filterField" placeholder="Filter by Field">
<input type="text" id="filterDegree" placeholder="Filter by Degree">

<br><br>

<button onclick="filterScholarships()">Apply Filter</button>
<button onclick="loadScholarships()">Clear Filter</button>

<br><br>

<input type="text" id="search" placeholder="Search scholarships..." onkeyup="searchScholarships()">

<br><br>

<button onclick="matchScholarships()">Find Matching Scholarships</button>

<br><br>

<div id="scholarship-list"></div>

<div id="admin-section" style="display:none;">

<h3>Add Scholarship (Admin)</h3>

<input type="text" id="title" placeholder="Scholarship Title"><br><br>

<input type="text" id="description" placeholder="Description"><br><br>

<input type="text" id="countryScholarship" placeholder="Country"><br><br>

<input type="text" id="fieldScholarship" placeholder="Field of Study"><br><br>

<input type="text" id="degreeScholarship" placeholder="Degree Level"><br><br>

<input type="date" id="deadline"><br><br>

<input type="text" id="link" placeholder="Application Link"><br><br>

<button onclick="addScholarship()">Add Scholarship</button>

</div>

<h3>Saved Scholarships</h3>

<div id="saved-list"></div>

<br>

<button onclick="logout()">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
addDoc,
setDoc,
doc,
getDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
authDomain: "scholarship-platform-ec01f.firebaseapp.com",
projectId: "scholarship-platform-ec01f",
storageBucket: "scholarship-platform-ec01f.firebasestorage.app",
messagingSenderId: "807575045909",
appId: "1:807575045909:web:9a61a548638423d7988b1c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const adminEmail = "lethabophenyo53@gmail.com";

let allScholarships = [];


async function loadScholarships(){

const querySnapshot = await getDocs(collection(db,"scholarship"));

const list = document.getElementById("scholarship-list");

list.innerHTML="";
allScholarships=[];

querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();
data.id = docSnap.id;

allScholarships.push(data);

displayScholarship(data);

});

}


function displayScholarship(data){

const list=document.getElementById("scholarship-list");

let deleteButton = "";

if(auth.currentUser && auth.currentUser.email === adminEmail){
deleteButton = `<button onclick="deleteScholarship('${data.id}')">Delete</button>`;
}

list.innerHTML += `

<div class="scholarship">

<img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644">

<div class="card-content">

<h4>${data.title}</h4>

<p class="deadline">Deadline: ${data.deadline || "Not specified"}</p>

<p>${data.description}</p>

<a href="${data.link}" target="_blank">
<button>Apply</button>
</a>

<button onclick="saveScholarship('${data.title}','${data.description}','${data.link}','${data.deadline}')">
Save
</button>

${deleteButton}

</div>

</div>

`;


window.filterScholarships = function(){

const country = document.getElementById("filterCountry").value.toLowerCase();
const field = document.getElementById("filterField").value.toLowerCase();
const degree = document.getElementById("filterDegree").value.toLowerCase();

const list = document.getElementById("scholarship-list");

list.innerHTML="";

allScholarships.forEach((s)=>{

let match = true;

if(country && s.country && !s.country.toLowerCase().includes(country)){
match = false;
}

if(field && s.field && !s.field.toLowerCase().includes(field)){
match = false;
}

if(degree && s.degree && !s.degree.toLowerCase().includes(degree)){
match = false;
}

if(match){
displayScholarship(s);
}

});

}


window.searchScholarships=function(){

const keyword=document.getElementById("search").value.toLowerCase();
const list=document.getElementById("scholarship-list");

list.innerHTML="";

allScholarships.forEach((s)=>{

if(
(s.title && s.title.toLowerCase().includes(keyword)) ||
(s.description && s.description.toLowerCase().includes(keyword))
){
displayScholarship(s);
}

});

}


window.matchScholarships=async function(){

const user=auth.currentUser;

if(!user) return;

const profileRef=doc(db,"profiles",user.uid);
const profileSnap=await getDoc(profileRef);

if(!profileSnap.exists()) return;

const profile=profileSnap.data();

const list=document.getElementById("scholarship-list");
list.innerHTML="";

allScholarships.forEach((s)=>{

if(
s.country?.toLowerCase()===profile.country?.toLowerCase() &&
s.field?.toLowerCase()===profile.field?.toLowerCase() &&
s.degree?.toLowerCase()===profile.degree?.toLowerCase()
){
displayScholarship(s);
}

});

}


window.addScholarship=async function(){

const title=document.getElementById("title").value;
const description=document.getElementById("description").value;
const country=document.getElementById("countryScholarship").value;
const field=document.getElementById("fieldScholarship").value;
const degree=document.getElementById("degreeScholarship").value;
const deadline=document.getElementById("deadline").value;
const link=document.getElementById("link").value;

await addDoc(collection(db,"scholarship"),{
title,
description,
country,
field,
degree,
deadline,
link
});

alert("Scholarship Added");

loadScholarships();

}


window.saveScholarship=async function(title,description,link,deadline){

const user=auth.currentUser;

if(!user){
alert("Login first");
return;
}

await addDoc(collection(db,"savedScholarships"),{
user:user.email,
title,
description,
link,
deadline
});

alert("Scholarship Saved");

loadSavedScholarships();

}


window.deleteScholarship = async function(id){

await deleteDoc(doc(db,"scholarship",id));

alert("Scholarship Deleted");

loadScholarships();

}


async function loadSavedScholarships(){

const user=auth.currentUser;

if(!user) return;

const querySnapshot=await getDocs(collection(db,"savedScholarships"));

const list=document.getElementById("saved-list");

list.innerHTML="";

querySnapshot.forEach((doc)=>{

const data=doc.data();

if(data.user===user.email){

list.innerHTML+=`

<div class="scholarship">

<h4>${data.title}</h4>

<p><b>Deadline:</b> ${data.deadline || "Not specified"}</p>

<p>${data.description}</p>

<a href="${data.link}" target="_blank">
<button>Apply</button>
</a>

</div>

`;

}

});

}


window.saveProfile=async function(){

const user=auth.currentUser;

if(!user){
alert("Login first");
return;
}

const country=document.getElementById("country").value;
const field=document.getElementById("field").value;
const degree=document.getElementById("degree").value;

await setDoc(doc(db,"profiles",user.uid),{
country,
field,
degree
});

alert("Profile Saved");

}


window.signUp=function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)
.then(()=>alert("User Created"))
.catch(error=>alert(error.message));

}


window.login=function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>alert("Logged In"))
.catch(error=>alert(error.message));

}


window.logout=function(){

document.getElementById("admin-section").style.display="none";

signOut(auth);

}


onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("auth-section").style.display="none";
document.getElementById("user-section").style.display="block";

document.getElementById("welcome").innerText="Welcome "+user.email;

if(user.email === adminEmail){
document.getElementById("admin-section").style.display="block";
}

loadScholarships();
loadSavedScholarships();

}
else{

document.getElementById("auth-section").style.display="block";
document.getElementById("user-section").style.display="none";

}

});

</script>

</body>
</html>
