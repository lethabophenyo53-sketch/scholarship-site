<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scholar Match</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Montserrat',sans-serif;
margin:0;
background:url("https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:30px;
margin-top:40px;
border-radius:12px;
}

.hero{
text-align:center;
padding:40px;
background:#1B1F3B;
color:white;
border-radius:10px;
}

input{
padding:10px;
margin:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 18px;
background:#6C63FF;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.scholarship{
border:1px solid #ddd;
padding:15px;
margin:10px;
border-radius:8px;
width:280px;
}

.scholarship-list{
display:flex;
flex-wrap:wrap;
}

#user-section{
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>Scholar Match</h1>
<p>Find Scholarships For Primary, High School & University</p>
</div>

<h3>Login / Sign Up</h3>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="signUp()">Sign Up</button>
<button onclick="login()">Login</button>

<div id="user-section">

<h2 id="welcome"></h2>

<h3>Add Scholarship</h3>

<input id="title" placeholder="Title"><br>
<input id="description" placeholder="Description"><br>
<input id="countryScholarship" placeholder="Country"><br>
<input id="fieldScholarship" placeholder="Field"><br>
<input id="degreeScholarship" placeholder="Degree"><br>
<input id="link" placeholder="Application Link"><br>

<button onclick="addScholarship()">Add Scholarship</button>

<h3>Scholarships</h3>

<div id="scholarship-list" class="scholarship-list"></div>

<button onclick="logout()">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged }

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore,
collection,
addDoc,
getDocs }

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {

apiKey:"PASTE_API_KEY",

authDomain:"PASTE_AUTH_DOMAIN",

projectId:"PASTE_PROJECT_ID",

storageBucket:"PASTE_BUCKET",

messagingSenderId:"PASTE_ID",

appId:"PASTE_APP_ID"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

window.signUp = async function(){

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

await createUserWithEmailAndPassword(auth,email,password);

alert("Account created");

}

window.login = async function(){

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

await signInWithEmailAndPassword(auth,email,password);

}

window.logout = function(){

signOut(auth);

}

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("user-section").style.display="block";

document.getElementById("welcome").innerText="Welcome "+user.email;

loadScholarships();

}else{

document.getElementById("user-section").style.display="none";

}

})

window.addScholarship = async function(){

const title=document.getElementById("title").value;

const description=document.getElementById("description").value;

const country=document.getElementById("countryScholarship").value;

const field=document.getElementById("fieldScholarship").value;

const degree=document.getElementById("degreeScholarship").value;

const link=document.getElementById("link").value;

await addDoc(collection(db,"scholarships"),{

title,description,country,field,degree,link

})

alert("Scholarship added")

loadScholarships()

}

async function loadScholarships(){

const querySnapshot=await getDocs(collection(db,"scholarships"));

const list=document.getElementById("scholarship-list");

list.innerHTML="";

querySnapshot.forEach((doc)=>{

const s=doc.data();

const div=document.createElement("div");

div.className="scholarship";

div.innerHTML=`

<h4>${s.title}</h4>

<p>${s.description}</p>

<p><b>Country:</b> ${s.country}</p>

<p><b>Field:</b> ${s.field}</p>

<p><b>Degree:</b> ${s.degree}</p>

<a href="${s.link}" target="_blank">Apply</a>

`;

list.appendChild(div);

})

}

</script>

</body>
</html>
