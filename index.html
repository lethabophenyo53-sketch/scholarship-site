<!DOCTYPE html>
<html>
<head>
<title>Scholar Match</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f6f9;
}

input{
padding:8px;
width:220px;
}

button{
padding:8px 15px;
margin:5px;
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

.scholarship{
background:white;
margin:15px auto;
padding:15px;
width:300px;
border-radius:8px;
box-shadow:0px 2px 5px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<h1>Scholar Match</h1>

<!-- AUTH SECTION -->

<div id="auth-section">

<input type="email" id="email" placeholder="Email"><br><br>

<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="signUp()">Sign Up</button>

<button onclick="login()">Login</button>

</div>


<!-- USER SECTION -->

<div id="user-section" style="display:none;">

<h2 id="welcome"></h2>


<!-- PROFILE -->

<h3>Your Profile</h3>

<input type="text" id="country" placeholder="Country"><br><br>

<input type="text" id="field" placeholder="Field of Study"><br><br>

<input type="text" id="degree" placeholder="Degree Level"><br><br>

<button onclick="saveProfile()">Save Profile</button>

<br><br>


<!-- SEARCH -->

<h3>Available Scholarships</h3>

<input 
type="text"
id="search"
placeholder="Search scholarships..."
onkeyup="searchScholarships()"
>

<br><br>

<div id="scholarship-list"></div>


<!-- ADMIN ADD -->

<h3>Add Scholarship (Admin)</h3>

<input type="text" id="title" placeholder="Scholarship Title"><br><br>

<input type="text" id="description" placeholder="Description"><br><br>

<input type="text" id="link" placeholder="Application Link"><br><br>

<button onclick="addScholarship()">Add Scholarship</button>


<!-- SAVED -->

<h3>Saved Scholarships</h3>

<div id="saved-list"></div>

<br>

<button onclick="logout()">Logout</button>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
addDoc,
setDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyDB94Hy6sFUBXE4ObSOQmPW5As4Fbxaoi4",
authDomain: "scholarship-platform-ec01f.firebaseapp.com",
projectId: "scholarship-platform-ec01f",
storageBucket: "scholarship-platform-ec01f.firebasestorage.app",
messagingSenderId: "807575045909",
appId: "1:807575045909:web:9a61a548638423d7988b1c"

};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);


let allScholarships = [];


/* LOAD SCHOLARSHIPS */

async function loadScholarships(){

const querySnapshot = await getDocs(collection(db,"scholarship"));

const list = document.getElementById("scholarship-list");

list.innerHTML="";

allScholarships=[];

querySnapshot.forEach((doc)=>{

const data = doc.data();

allScholarships.push(data);

displayScholarship(data);

});

}


/* DISPLAY */

function displayScholarship(data){

const list = document.getElementById("scholarship-list");

list.innerHTML += `

<div class="scholarship">

<h4>${data.title}</h4>

<p>${data.description}</p>

<a href="${data.link}" target="_blank">

<button>Apply Now</button>

</a>

<button onclick="saveScholarship('${data.title}','${data.description}','${data.link}')">

Save

</button>

</div>

`;

}


/* SEARCH */

window.searchScholarships=function(){

const keyword=document.getElementById("search").value.toLowerCase();

const list=document.getElementById("scholarship-list");

list.innerHTML="";

allScholarships.forEach((s)=>{

if(

s.title.toLowerCase().includes(keyword) ||

s.description.toLowerCase().includes(keyword)

){

displayScholarship(s);

}

});

}


/* ADD SCHOLARSHIP */

window.addScholarship = async function(){

const title=document.getElementById("title").value;
const description=document.getElementById("description").value;
const link=document.getElementById("link").value;

await addDoc(collection(db,"scholarship"),{

title:title,
description:description,
link:link

});

alert("Scholarship Added");

loadScholarships();

}


/* SAVE SCHOLARSHIP */

window.saveScholarship = async function(title,description,link){

const user = auth.currentUser;

await addDoc(collection(db,"savedScholarships"),{

user:user.email,
title:title,
description:description,
link:link

});

alert("Scholarship Saved");

loadSavedScholarships();

}


/* LOAD SAVED */

async function loadSavedScholarships(){

const user = auth.currentUser;

if(!user) return;

const querySnapshot = await getDocs(collection(db,"savedScholarships"));

const list=document.getElementById("saved-list");

list.innerHTML="";

querySnapshot.forEach((doc)=>{

const data=doc.data();

if(data.user===user.email){

list.innerHTML+=`

<div class="scholarship">

<h4>${data.title}</h4>

<p>${data.description}</p>

<a href="${data.link}" target="_blank">

<button>Apply</button>

</a>

</div>

`;

}

});

}


/* SAVE PROFILE */

window.saveProfile = async function(){

const user = auth.currentUser;

if(!user){

alert("Login first");

return;

}

const country=document.getElementById("country").value;
const field=document.getElementById("field").value;
const degree=document.getElementById("degree").value;

await setDoc(doc(db,"profiles",user.uid),{

country:country,
field:field,
degree:degree

});

alert("Profile Saved");

}


/* AUTH */

window.signUp=function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)

.then(()=>alert("User Created"))

.catch(error=>alert(error.message));

}


window.login=function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(()=>alert("Logged In"))

.catch(error=>alert(error.message));

}


window.logout=function(){

signOut(auth);

}


/* AUTH STATE */

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("auth-section").style.display="none";

document.getElementById("user-section").style.display="block";

document.getElementById("welcome").innerText="Welcome "+user.email;

loadScholarships();

loadSavedScholarships();

}

else{

document.getElementById("auth-section").style.display="block";

document.getElementById("user-section").style.display="none";

}

});

</script>

</body>
</html>
