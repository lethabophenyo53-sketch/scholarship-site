<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Success</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#0b1220;
color:white;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:520px;
min-height:100vh;
background:#111827;
padding-bottom:80px;
}

.header{
padding:18px;
text-align:center;
font-weight:700;
background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.section{
display:none;
padding:15px;
}

.active{
display:block;
}

.card{
background:#1f2937;
padding:14px;
margin:10px 0;
border-radius:14px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-top:6px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
}

input, select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:none;
outline:none;
background:#0f172a;
color:white;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
justify-content:center;
}

.nav-inner{
width:100%;
max-width:520px;
display:flex;
background:#0f172a;
border-top:1px solid #222;
}

.nav-inner button{
flex:1;
background:none;
border:none;
padding:12px;
color:white;
}
</style>
</head>

<body>

<div class="app">

<div class="header">🎓 Student Success</div>

<!-- HOME -->
<div id="home" class="section active">
<h3>Welcome 👋</h3>

<div class="card">
<p>📚 Past Papers (Grade 1–12)</p>
<p>🎓 Scholarships</p>
<p>📈 Study Resources</p>
</div>
</div>

<!-- SCHOLARSHIPS -->
<div id="scholarships" class="section">
<h3>🎓 Scholarships</h3>
<div id="schList"></div>
</div>

<!-- PAST PAPERS -->
<div id="papers" class="section">
<h3>📚 Past Papers</h3>

<select id="gradeFilter" onchange="loadPapers()">
<option value="all">All Grades</option>
<option value="1-3">Grade 1–3</option>
<option value="4-6">Grade 4–6</option>
<option value="7-9">Grade 7–9</option>
<option value="10">Grade 10</option>
<option value="11">Grade 11</option>
<option value="12">Grade 12</option>
</select>

<div id="paperList"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
<h3>Admin Panel 🔐</h3>

<input id="title" placeholder="Paper Title">
<input id="grade" placeholder="Grade (e.g. 12)">
<input id="link" placeholder="Download Link">

<button onclick="addPaper()">Upload Paper</button>

<hr style="margin:15px 0;opacity:0.2"/>

<input id="sTitle" placeholder="Scholarship Title">
<input id="sDesc" placeholder="Description">

<button onclick="addScholarship()">Add Scholarship</button>
</div>

</div>

<!-- NAV -->
<div class="nav">
<div class="nav-inner">
<button onclick="go('home')">Home</button>
<button onclick="go('scholarships')">Scholarships</button>
<button onclick="go('papers')">Papers</button>
<button onclick="go('admin')">Admin</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* NAV */
window.go = (page)=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(page).classList.add("active");
};

/* ---------------- PAPERS ---------------- */

window.addPaper = async ()=>{
await addDoc(collection(db,"papers"),{
title: title.value,
grade: grade.value,
link: link.value
});

alert("Paper uploaded!");
loadPapers();
};

window.loadPapers = async ()=>{
const snap = await getDocs(collection(db,"papers"));
const el = document.getElementById("paperList");
const filter = document.getElementById("gradeFilter").value;

el.innerHTML="";

snap.forEach(doc=>{
const p = doc.data();

if(filter !== "all"){
if(filter === "1-3" && !(p.grade<=3)) return;
if(filter === "4-6" && !(p.grade>=4 && p.grade<=6)) return;
if(filter === "7-9" && !(p.grade>=7 && p.grade<=9)) return;
if(filter === "10" && p.grade!="10") return;
if(filter === "11" && p.grade!="11") return;
if(filter === "12" && p.grade!="12") return;
}

el.innerHTML += `
<div class="card">
<h4>${p.title}</h4>
<p>Grade ${p.grade}</p>
<a href="${p.link}" target="_blank">
<button>Download</button>
</a>
</div>
`;
});
};

/* ---------------- SCHOLARSHIPS ---------------- */

window.addScholarship = async ()=>{
await addDoc(collection(db,"scholarships"),{
title: sTitle.value,
desc: sDesc.value
});

alert("Scholarship added!");
loadScholarships();
};

window.loadScholarships = async ()=>{
const snap = await getDocs(collection(db,"scholarships"));
const el = document.getElementById("schList");

el.innerHTML="";

snap.forEach(doc=>{
const s = doc.data();

el.innerHTML += `
<div class="card">
<h4>${s.title}</h4>
<p>${s.desc}</p>
</div>
`;
});
};

/* INIT */
loadScholarships();
loadPapers();

</script>

</body>
</html>
