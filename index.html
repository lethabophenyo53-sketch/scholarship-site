<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scholar Match FINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#0b1220;color:#fff}
.app{max-width:500px;margin:auto;background:#111827;min-height:100vh;padding-bottom:70px}

.header{
padding:18px;text-align:center;font-weight:700;
background:linear-gradient(135deg,#6366f1,#a855f7);
}

.section{display:none;padding:15px}
.active{display:block}

.card{
background:#1f2937;
padding:12px;
margin:10px 0;
border-radius:14px;
}

input,select{
width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none;
}

button{
width:100%;padding:10px;border:none;border-radius:8px;
margin-top:6px;background:#6366f1;color:white;font-weight:600;
}

.nav{
position:fixed;bottom:0;width:100%;max-width:500px;
display:flex;background:#0f172a;border-top:1px solid #333;
}

.nav button{flex:1;background:none;border:none;color:white;padding:12px}

.locked{opacity:0.3;filter:blur(2px)}
.small{font-size:12px;opacity:0.7}
</style>
</head>

<body>

<div class="app">

<div class="header">🎓 SCHOLAR MATCH FINAL</div>

<!-- AUTH -->
<div id="auth" class="section active">
<h3>Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- HOME -->
<div id="home" class="section">
<h3 id="welcome"></h3>
<button onclick="logout()">Logout</button>

<div class="card">
<h3>💎 Premium (R50)</h3>
<p>Unlock premium scholarships + alerts</p>
<button onclick="upgrade()">Upgrade</button>
</div>
</div>

<!-- SCHOLARSHIPS -->
<div id="scholarships" class="section">
<h3>Scholarships</h3>
<div id="list"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
<h3>Admin Panel</h3>

<input id="title" placeholder="Title">
<input id="desc" placeholder="Description">
<input id="link" placeholder="Link">
<input id="deadline" type="date">

<select id="type">
<option value="free">Free</option>
<option value="premium">Premium</option>
</select>

<button onclick="addScholarship()">Add</button>
<button onclick="aiGenerate()">AI Generate</button>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="go('home')">Home</button>
<button onclick="go('scholarships')">List</button>
<button onclick="go('admin')">Admin</button>
</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
collection,
addDoc,
getDocs,
doc,
getDoc,
setDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let profile = null;
let isAdmin = false;

/* NAV SAFE */
window.go = (page)=>{
if(page!=="auth" && !auth.currentUser) return go("auth");

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

/* AUTH */
window.signup = ()=>createUserWithEmailAndPassword(auth,email.value,password.value)
.then(async(u)=>{
await setDoc(doc(db,"users",u.user.uid),{premium:false});
});

window.login = ()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.logout = ()=>signOut(auth);

/* STATE */
onAuthStateChanged(auth, async(user)=>{

if(!user){go("auth");return;}

const snap = await getDoc(doc(db,"users",user.uid));
profile = snap.data();

isAdmin = user.email === "YOUR_ADMIN_EMAIL@gmail.com";

welcome.innerText = "Welcome " + user.email;

loadScholarships();
go("home");
});

/* LOAD */
window.loadScholarships = async ()=>{

list.innerHTML="";

const snap = await getDocs(collection(db,"scholarships"));

snap.forEach(d=>{
const s=d.data();

const locked = s.type==="premium" && !profile?.premium;

const days = Math.ceil((new Date(s.deadline)-new Date())/(1000*60*60*24));

list.innerHTML+=`
<div class="card ${locked?'locked':''}">
<h4>${s.title}</h4>
<p>${locked?'🔒 Premium Locked':s.desc}</p>
<p class="small">⏳ ${days} days left</p>

${locked?
"<button disabled>Locked</button>":
`<a href="${s.link}" target="_blank"><button>Apply</button></a>`}
</div>`;
});
}

/* ADMIN */
window.addScholarship = async ()=>{
if(!isAdmin) return alert("No access");

await addDoc(collection(db,"scholarships"),{
title:title.value,
desc:desc.value,
link:link.value,
deadline:deadline.value,
type:type.value
});

loadScholarships();
}

/* AI */
window.aiGenerate = async ()=>{
if(!isAdmin) return;

const data=[
{title:"NSFAS Funding",desc:"Full funding",link:"#",deadline:"2026-12-01",type:"free"},
{title:"Tech Global Scholarship",desc:"AI studies",link:"#",deadline:"2026-10-01",type:"premium"}
];

for(let s of data){
await addDoc(collection(db,"scholarships"),s);
}

loadScholarships();
}

/* UPGRADE */
window.upgrade = ()=>{
const f=document.createElement("form");
f.method="POST";
f.action="https://www.payfast.co.za/eng/process";

const data={
merchant_id:"YOUR_ID",
merchant_key:"YOUR_KEY",
amount:"50.00",
item_name:"Premium",
return_url:window.location.href+"?paid=true",
cancel_url:window.location.href
};

for(let k in data){
let i=document.createElement("input");
i.name=k;i.value=data[k];i.type="hidden";
f.appendChild(i);
}

document.body.appendChild(f);
f.submit();
}

/* PAYMENT */
window.addEventListener("load",async()=>{
const url=new URLSearchParams(window.location.search);

if(url.get("paid")==="true" && auth.currentUser){
await updateDoc(doc(db,"users",auth.currentUser.uid),{
premium:true
});
alert("Premium Activated");
loadScholarships();
}
});

</script>

</body>
</html>
